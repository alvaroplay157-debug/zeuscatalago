<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS — Urban Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--maroon); color: var(--cream); margin: 0; overflow-x: hidden; }

        header { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #2a0006 0%, #1a0004 100%); }
        header h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 6rem); color: var(--gold); letter-spacing: 15px; margin: 0; }
        header p { letter-spacing: 5px; opacity: 0.6; font-size: 0.8rem; text-transform: uppercase; }

        .filters { display: flex; justify-content: center; gap: 10px; margin: 30px 0; flex-wrap: wrap; padding: 0 20px; }
        .f-btn { background: none; border: 1px solid rgba(201, 168, 76, 0.3); color: var(--gold); padding: 8px 20px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; border-radius: 50px; transition: 0.3s; }
        .f-btn.active { background: var(--gold); color: var(--maroon); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; padding: 20px 20px 100px; }

        .card { position: relative; }
        .img-container { width: 100%; height: 450px; position: relative; overflow: hidden; border-radius: 4px; background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        
        .slide-indicators { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; gap: 4px; z-index: 5; }
        .ind-bar { height: 2px; flex: 1; background: rgba(255,255,255,0.2); }
        .ind-bar.active { background: var(--gold); box-shadow: 0 0 5px var(--gold); }

        .slide-nav { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 4; cursor: pointer; }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }

        .info { padding: 20px 0; }
        .info h3 { margin: 0; font-family: 'Playfair Display'; color: var(--gold); font-size: 1.3rem; letter-spacing: 1px; }
        .price { display: block; margin: 5px 0 20px; font-weight: 300; opacity: 0.9; font-size: 1.1rem; }

        .btn-wa { background: #25D366; color: white; padding: 16px; text-decoration: none; display: block; text-align: center; font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-wa:hover { filter: brightness(1.1); }
        .btn-medidas { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-medidas:hover { border-color: var(--gold); color: var(--gold); }

        /* Modal de Medidas */
        #modalMedidas { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000; justify-content: center; align-items: center; }
        .m-content { background: #1a0004; border: 1px solid var(--gold); padding: 40px; text-align: center; width: 90%; max-width: 400px; position: relative; }
        .m-table { width: 100%; border-collapse: collapse; margin: 25px 0; }
        .m-table td { padding: 15px; border-bottom: 1px solid rgba(201,168,76,0.1); font-size: 13px; letter-spacing: 1px; }
        .close-m { background: var(--gold); border: none; color: var(--maroon); padding: 10px 25px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>

    <header>
        <h1>ZEUS</h1>
        <p>Urban Luxury — Patos, PB</p>
    </header>

    <div class="filters" id="filtros"></div>

    <div class="grid" id="grid"></div>

    <div id="modalMedidas">
        <div class="m-content">
            <h2 style="color:var(--gold); font-family:'Playfair Display'; letter-spacing: 3px;">GUIA DE TAMANHOS</h2>
            <table class="m-table">
                <tr><td>TAMANHO P</td><td>50cm LARG | 70cm ALT</td></tr>
                <tr><td>TAMANHO M</td><td>52cm LARG | 72cm ALT</td></tr>
                <tr><td>TAMANHO G</td><td>54cm LARG | 74cm ALT</td></tr>
                <tr><td>TAMANHO GG</td><td>56cm LARG | 76cm ALT</td></tr>
            </table>
            <button class="close-m" onclick="toggleMedidas()">Fechar</button>
        </div>
    </div>

    <script>
        // Credenciais Supabase
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        
        let produtosGerais = [];
        let whatsAppConfig = "";

        async function init() {
            try {
                // 1. Procura o número do WhatsApp na tabela Configuracoes
                const { data: cfg } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single();
                // Limpa o número de qualquer caractere não numérico para evitar erro 404
                whatsAppConfig = cfg ? cfg.whaatsapp.replace(/\D/g, '') : "55839XXXXXXXX";

                // 2. Procura os produtos
                const { data, error } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
                if (error) throw error;
                produtosGerais = data;

                // 3. Filtros Dinâmicos
                const categorias = ['TODOS', ...new Set(data.map(p => p.categoria).filter(c => c))];
                document.getElementById('filtros').innerHTML = categorias.map(c => `
                    <button class="f-btn ${c==='TODOS'?'active':''}" onclick="filtrar('${c}', this)">${c}</button>
                `).join('');

                render(produtosGerais);
            } catch (err) {
                console.error("Erro ao carregar dados:", err);
            }
        }

        function render(lista) {
            const grid = document.getElementById('grid');
            grid.innerHTML = lista.map((p, idx) => {
                // Prepara o array de fotos (capa + extras)
                const fotos = [p.imagem_url, ...(p.fotos_extras ? p.fotos_extras.split(',') : [])].filter(url => url.trim() !== "");
                
                const indicadores = fotos.map((_, i) => `<div class="ind-bar ${i===0?'active':''}" id="ind-${idx}-${i}"></div>`).join('');
                const imagens = fotos.map(url => `<img src="${url.trim()}">`).join('');

                // Link do WhatsApp com encodeURIComponent para tratar espaços e caracteres especiais no nome do produto
                const linkWA = `https://api.whatsapp.com/send?phone=${whatsAppConfig}&text=Salve%20ZEUS!%20Tenho%20interesse%20no%20item:%20${encodeURIComponent(p.nome)}`;

                return `
                <div class="card">
                    <div class="img-container">
                        <div class="slide-indicators">${indicadores}</div>
                        <div class="slide-nav nav-prev" onclick="moveSlide(${idx}, -1, ${fotos.length})"></div>
                        <div class="slide-nav nav-next" onclick="moveSlide(${idx}, 1, ${fotos.length})"></div>
                        <div class="slider-wrapper" id="wrap-${idx}">${imagens}</div>
                    </div>
                    <div class="info">
                        <h3>${p.nome}</h3>
                        <span class="price">R$ ${p.preco.toFixed(2)}</span>
                        
                        ${p.esgotado 
                            ? '<div class="btn-wa" style="background:#333; cursor:not-allowed">Produto Esgotado</div>' 
                            : `<a href="${linkWA}" class="btn-wa" target="_blank">Pedir no WhatsApp</a>`
                        }
                        
                        <button class="btn-medidas" onclick="toggleMedidas()">📐 Guia de Medidas</button>
                    </div>
                </div>`;
            }).join('');
        }

        // Lógica do Carrossel de Fotos
        let slidePos = {};
        function moveSlide(idx, dir, total) {
            if (total <= 1) return;
            if (!slidePos[idx]) slidePos[idx] = 0;
            
            slidePos[idx] = (slidePos[idx] + dir + total) % total;
            
            const wrapper = document.getElementById(`wrap-${idx}`);
            wrapper.style.transform = `translateX(-${slidePos[idx] * 100}%)`;
            
            // Atualiza as barrinhas indicadoras
            for(let i=0; i < total; i++) {
                const ind = document.getElementById(`ind-${idx}-${i}`);
                if(ind) ind.classList.toggle('active', i === slidePos[idx]);
            }
        }

        function filtrar(c, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const filtrados = (c === 'TODOS') 
                ? produtosGerais 
                : produtosGerais.filter(p => p.categoria === c);
            
            render(filtrados);
        }

        function toggleMedidas() {
            const m = document.getElementById('modalMedidas');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        init();
    </script>
</body>
</html>
