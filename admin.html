<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ZEUS - Admin Master</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; }
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; display: flex; }
        .sidebar { width: 250px; background: var(--maroon); color: var(--gold); height: 100vh; padding: 20px; position: fixed; }
        .nav-link { display: block; padding: 15px; color: var(--gold); text-decoration: none; cursor: pointer; border-radius: 5px; margin-bottom: 10px; border: 1px solid rgba(201,168,76,0.2); }
        .nav-link.active { background: var(--gold); color: var(--maroon); }
        .main { margin-left: 290px; padding: 40px; flex: 1; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; }
        .grid-fotos { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .slot { aspect-ratio: 1; background: #eee; border: 1px dashed #ccc; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; font-size: 10px; }
        .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-acao { background: var(--maroon); color: var(--gold); padding: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .item { display: flex; align-items: center; background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; gap: 15px; }
        .item img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ZEUS ADMIN</h2>
        <div class="nav-link active" onclick="show('novo', this)">➕ NOVO PRODUTO</div>
        <div class="nav-link" onclick="show('estoque', this); listar()">📦 ESTOQUE</div>
        <div class="nav-link" onclick="show('config', this); carregarWA()">⚙️ CONFIGURAÇÕES</div>
        <a href="index.html" class="nav-link">🏛️ VER LOJA</a>
    </div>

    <div class="main">
        <div id="sec-novo" class="section active">
            <h2 id="titulo">Cadastrar Produto</h2>
            <div class="card">
                <div class="grid-fotos">
                    <div class="slot" onclick="document.getElementById('f0').click()" id="s0"><input type="file" id="f0" hidden onchange="pre(this,0)">CAPA</div>
                    <div class="slot" onclick="document.getElementById('f1').click()" id="s1"><input type="file" id="f1" hidden onchange="pre(this,1)">FOTO 2</div>
                    <div class="slot" onclick="document.getElementById('f2').click()" id="s2"><input type="file" id="f2" hidden onchange="pre(this,2)">FOTO 3</div>
                    <div class="slot" onclick="document.getElementById('f3').click()" id="s3"><input type="file" id="f3" hidden onchange="pre(this,3)">FOTO 4</div>
                </div>
                <input type="hidden" id="eid">
                <input type="text" id="enome" placeholder="Nome">
                <input type="number" id="epreco" placeholder="Preço (R$)">
                <input type="text" id="ecat" placeholder="Categoria">
                <textarea id="edesc" placeholder="Descrição"></textarea>
                <button class="btn-acao" onclick="salvar()">SALVAR PRODUTO</button>
            </div>
        </div>

        <div id="sec-estoque" class="section">
            <h2>Gerenciar Estoque</h2>
            <div id="lista"></div>
        </div>

        <div id="sec-config" class="section">
            <h2>Configurações</h2>
            <div class="card">
                <input type="text" id="wa-num" placeholder="WhatsApp (Ex: 5583...)">
                <button class="btn-acao" onclick="salvarWA()">ATUALIZAR NÚMERO</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4moxqvtamsxqpabbadeiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        let fotos = ["", "", "", ""];

        function pre(input, i) {
            const reader = new FileReader();
            reader.onload = (e) => {
                fotos[i] = e.target.result;
                document.getElementById('s'+i).innerHTML = `<img src="${e.target.result}">`;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function salvar() {
            const id = document.getElementById('eid').value;
            const dados = {
                nome: document.getElementById('enome').value,
                preco: parseFloat(document.getElementById('epreco').value),
                categoria: document.getElementById('ecat').value.toUpperCase(),
                descricao: document.getElementById('edesc').value,
                imagem_url: fotos[0],
                fotos_extras: fotos.slice(1).filter(f => f.length > 50).join(',')
            };
            
            let res;
            if(id) res = await _supabase.from('Produtos').update(dados).eq('id', id);
            else res = await _supabase.from('Produtos').insert([dados]);
            
            if(!res.error) { alert("Sucesso!"); location.reload(); }
        }

        async function listar() {
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            document.getElementById('lista').innerHTML = data.map(p => `
                <div class="item">
                    <img src="${p.imagem_url}">
                    <div style="flex:1"><b>${p.nome}</b><br><small>${p.categoria}</small></div>
                    <button onclick='editar(${JSON.stringify(p)})'>✏️</button>
                    <button onclick="excluir(${p.id})" style="color:red">✖</button>
                </div>
            `).join('');
        }

        function editar(p) {
            show('novo');
            document.getElementById('titulo').innerText = "Editando: " + p.nome;
            document.getElementById('eid').value = p.id;
            document.getElementById('enome').value = p.nome;
            document.getElementById('epreco').value = p.preco;
            document.getElementById('ecat').value = p.categoria;
            document.getElementById('edesc').value = p.descricao;
            
            fotos[0] = p.imagem_url;
            document.getElementById('s0').innerHTML = `<img src="${p.imagem_url}">`;
            
            const extras = p.fotos_extras ? p.fotos_extras.split(',') : [];
            for(let i=1; i<=3; i++) {
                fotos[i] = extras[i-1] || "";
                document.getElementById('s'+i).innerHTML = fotos[i] ? `<img src="${fotos[i]}">` : `FOTO ${i+1}`;
            }
        }

        async function excluir(id) { if(confirm("Apagar?")) { await _supabase.from('Produtos').delete().eq('id', id); listar(); } }
        
        async function salvarWA() {
            const num = document.getElementById('wa-num').value.replace(/\D/g, '');
            await _supabase.from('Configuracoes').upsert({ id: 1, whaatsapp: num });
            alert("WhatsApp Atualizado!");
        }

        async function carregarWA() {
            const { data } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).maybeSingle();
            if(data) document.getElementById('wa-num').value = data.whaatsapp;
        }

        function show(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
            if(btn) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                btn.classList.add('active');
            }
        }
    </script>
</body>
</html>
