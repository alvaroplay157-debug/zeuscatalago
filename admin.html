<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS - Painel Administrativo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; --white: #ffffff; }
        body { background: var(--cream); font-family: 'Inter', sans-serif; margin: 0; display: flex; color: var(--maroon); }
        
        /* Sidebar */
        .sidebar { width: 280px; background: var(--maroon); color: var(--gold); height: 100vh; padding: 40px 20px; position: fixed; box-sizing: border-box; }
        .sidebar h2 { font-family: 'Playfair Display', serif; letter-spacing: 5px; text-align: center; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 20px; margin-bottom: 30px; }
        .nav-link { display: block; padding: 15px; color: var(--gold); text-decoration: none; font-weight: 600; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--gold); color: var(--maroon); }

        /* Main Content */
        .main { margin-left: 280px; flex: 1; padding: 60px; max-width: 1100px; box-sizing: border-box; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        h1 { font-family: 'Playfair Display', serif; margin-bottom: 30px; }

        label { display: block; margin-top: 15px; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        input, textarea, select { width: 100%; padding: 15px; margin: 8px 0 20px; border: 1px solid #eee; border-radius: 8px; font-size: 14px; background: #fafafa; font-family: inherit; }
        
        .btn-save { background: var(--maroon); color: var(--gold); padding: 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-save:hover { filter: brightness(1.2); }

        /* Fotos */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin: 20px 0; }
        .photo-item { position: relative; height: 120px; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-photo { position: absolute; top: 5px; right: 5px; background: #ff4444; color: white; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; justify-content: center; align-items: center; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: #fdfdfd; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .stock-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .btn-edit { background: var(--gold); color: var(--maroon); border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-del { background: #ffeded; color: #ff4444; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Modal de Edição */
        #modal-edit { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ZEUS</h2>
        <div class="nav-link active" onclick="show('novo')">➕ NOVO PRODUTO</div>
        <div class="nav-link" onclick="show('estoque'); listar();">📝 MEU ESTOQUE</div>
        <div class="nav-link" onclick="show('config'); carregarWA();">⚙️ CONFIGURAÇÕES</div>
        <br>
        <a href="index.html" class="nav-link" style="border: 1px solid var(--gold); text-align: center;">VER LOJA</a>
    </div>

    <div class="main">
        <div id="sec-novo" class="section active">
            <h1>Cadastrar Novo Item</h1>
            <div class="card">
                <label>Nome do Produto</label>
                <input type="text" id="nnome" placeholder="Ex: Camiseta Zeus Oversized">
                
                <div style="display:flex; gap:20px;">
                    <div style="flex:1;">
                        <label>Preço (R$)</label>
                        <input type="number" id="npreco" step="0.01" placeholder="149.90">
                    </div>
                    <div style="flex:1;">
                        <label>Categoria</label>
                        <input type="text" id="ncategoria" placeholder="Ex: CAMISETAS">
                    </div>
                </div>
                
                <label>Fotos (A primeira será a capa)</label>
                <input type="text" id="nimg" placeholder="Link da imagem principal">
                <textarea id="nextras" placeholder="Links das fotos extras (separados por vírgula)"></textarea>

                <label>Descrição</label>
                <textarea id="ndesc" rows="4" placeholder="Detalhes do produto..."></textarea>
                
                <button class="btn-save" onclick="salvarNovo()">PUBLICAR PRODUTO</button>
            </div>
        </div>

        <div id="sec-estoque" class="section">
            <h1>Gerenciamento de Estoque</h1>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Imagem</th>
                            <th>Produto</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-estoque"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-config" class="section">
            <h1>Configurações Gerais</h1>
            <div class="card" style="max-width: 500px;">
                <label>Número do WhatsApp (Com DDD, apenas números)</label>
                <input type="text" id="wa-num" placeholder="55839XXXXXXXX">
                <button class="btn-save" onclick="salvarWA()">ATUALIZAR CONTATO</button>
            </div>
        </div>
    </div>

    <div id="modal-edit">
        <div class="modal-content">
            <h2 style="font-family:'Playfair Display';">Editar Produto</h2>
            <input type="hidden" id="edit-id">
            
            <label>Nome</label>
            <input type="text" id="edit-nome">
            
            <label>Preço</label>
            <input type="number" id="edit-preco" step="0.01">

            <label>Status de Estoque</label>
            <select id="edit-esgotado">
                <option value="false">DISPONÍVEL</option>
                <option value="true">ESGOTADO</option>
            </select>

            <label>Link da Imagem Principal</label>
            <input type="text" id="edit-img">

            <label>Fotos Extras (Links separados por vírgula)</label>
            <textarea id="edit-extras"></textarea>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-save" onclick="salvarEdicao()">SALVAR ALTERAÇÕES</button>
                <button class="btn-del" style="background:#eee; color:#333; width:100%;" onclick="fecharModal()">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
        }

        async function salvarNovo() {
            const { error } = await _supabase.from('Produtos').insert([{
                nome: document.getElementById('nnome').value,
                preco: parseFloat(document.getElementById('npreco').value),
                categoria: document.getElementById('ncategoria').value.toUpperCase(),
                imagem_url: document.getElementById('nimg').value,
                fotos_extras: document.getElementById('nextras').value,
                descricao: document.getElementById('ndesc').value,
                esgotado: false
            }]);
            if(!error) { alert("Produto cadastrado!"); location.reload(); }
        }

        async function listar() {
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            document.getElementById('lista-estoque').innerHTML = data.map(p => `
                <tr>
                    <td><img src="${p.imagem_url}" class="stock-img"></td>
                    <td><b>${p.nome}</b><br><small>${p.categoria}</small></td>
                    <td><b style="color:${p.esgotado?'red':'green'}">${p.esgotado?'ESGOTADO':'ATIVO'}</b></td>
                    <td>
                        <button class="btn-edit" onclick='abrirEdicao(${JSON.stringify(p)})'>EDITAR</button>
                        <button class="btn-del" onclick="excluir(${p.id})">APAGAR</button>
                    </td>
                </tr>
            `).join('');
        }

        function abrirEdicao(p) {
            document.getElementById('modal-edit').style.display = 'flex';
            document.getElementById('edit-id').value = p.id;
            document.getElementById('edit-nome').value = p.nome;
            document.getElementById('edit-preco').value = p.preco;
            document.getElementById('edit-esgotado').value = p.esgotado.toString();
            document.getElementById('edit-img').value = p.imagem_url;
            document.getElementById('edit-extras').value = p.fotos_extras || '';
        }

        function fecharModal() { document.getElementById('modal-edit').style.display = 'none'; }

        async function salvarEdicao() {
            const id = document.getElementById('edit-id').value;
            const { error } = await _supabase.from('Produtos').update({
                nome: document.getElementById('edit-nome').value,
                preco: parseFloat(document.getElementById('edit-preco').value),
                esgotado: document.getElementById('edit-esgotado').value === 'true',
                imagem_url: document.getElementById('edit-img').value,
                fotos_extras: document.getElementById('edit-extras').value
            }).eq('id', id);

            if(!error) { alert("Atualizado com sucesso!"); fecharModal(); listar(); }
        }

        async function excluir(id) {
            if(confirm("Deseja apagar este item permanentemente?")) {
                await _supabase.from('Produtos').delete().eq('id', id);
                listar();
            }
        }

        async function salvarWA() {
            const num = document.getElementById('wa-num').value.replace(/\D/g, '');
            await _supabase.from('Configuracoes').update({ whaatsapp: num }).eq('id', 1);
            alert("WhatsApp Atualizado!");
        }

        async function carregarWA() {
            const { data } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single();
            if(data) document.getElementById('wa-num').value = data.whaatsapp;
        }

        carregarWA();
    </script>
</body>
</html>
