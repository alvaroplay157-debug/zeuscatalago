<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS - Master Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; --white: #ffffff; }
        body { background: #f8f8f8; font-family: 'Inter', sans-serif; margin: 0; display: flex; color: #222; }
        
        /* Overlay de Login */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--maroon); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-card { background: white; padding: 40px; border-radius: 12px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-card h2 { font-family: 'Playfair Display'; color: var(--maroon); margin-bottom: 20px; letter-spacing: 3px; }
        
        /* Restante do CSS mantido para consistência */
        .sidebar { width: 280px; background: var(--maroon); color: var(--gold); height: 100vh; padding: 40px 20px; position: fixed; }
        .sidebar h2 { font-family: 'Playfair Display', serif; letter-spacing: 5px; text-align: center; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 20px; margin-bottom: 30px; }
        .nav-link { display: block; padding: 15px; color: var(--gold); text-decoration: none; font-weight: 600; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--gold); color: var(--maroon); }
        .main { margin-left: 280px; flex: 1; padding: 50px; max-width: 1200px; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 5px 30px rgba(0,0,0,0.03); margin-bottom: 20px; }
        input[type="password"], input[type="text"], input[type="number"], textarea { width: 100%; padding: 16px; margin: 8px 0; border: 1px solid #e1e1e1; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: var(--maroon); color: var(--gold); padding: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; letter-spacing: 2px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 10px; }
        .photo-slot { background: #f0f0f0; border: 2px dashed #ccc; border-radius: 12px; height: 180px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>ZEUS ADMIN</h2>
            <input type="password" id="pass-input" placeholder="Digite a Senha Mestra">
            <button class="btn-save" onclick="verificarSenha()">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>ZEUS</h2>
        <div class="nav-link active" onclick="show('novo')">➕ NOVO PRODUTO</div>
        <div class="nav-link" onclick="show('estoque'); listar();">📝 MEU ESTOQUE</div>
        <div class="nav-link" onclick="show('config'); carregarWA();">⚙️ CONFIGURAÇÕES</div>
        <br>
        <div class="nav-link" onclick="logout()" style="border: 1px solid #ff4444; color: #ff4444; text-align: center;">SAIR (LOGOUT)</div>
    </div>

    <div class="main">
        <div id="sec-novo" class="section active">
            <h1>Criar Novo Produto</h1>
            <div class="card">
                <label>Galeria de Fotos (Toque para escolher)</label>
                <div class="photo-grid">
                    <div class="photo-slot" id="slot-0" onclick="document.getElementById('file-0').click()">
                        <input type="file" id="file-0" accept="image/*" style="display:none" onchange="carregarFoto(event, 0)">+ Capa
                    </div>
                    <div class="photo-slot" id="slot-1" onclick="document.getElementById('file-1').click()">
                        <input type="file" id="file-1" accept="image/*" style="display:none" onchange="carregarFoto(event, 1)">+ Foto 2
                    </div>
                    <div class="photo-slot" id="slot-2" onclick="document.getElementById('file-2').click()">
                        <input type="file" id="file-2" accept="image/*" style="display:none" onchange="carregarFoto(event, 2)">+ Foto 3
                    </div>
                    <div class="photo-slot" id="slot-3" onclick="document.getElementById('file-3').click()">
                        <input type="file" id="file-3" accept="image/*" style="display:none" onchange="carregarFoto(event, 3)">+ Foto 4
                    </div>
                </div>
                <input type="text" id="nnome" placeholder="Nome do Produto">
                <input type="number" id="npreco" step="0.01" placeholder="Preço (R$)">
                <input type="text" id="ncategoria" placeholder="Categoria">
                <textarea id="ndesc" rows="3" placeholder="Descrição..."></textarea>
                <button class="btn-save" id="btn-publicar" onclick="salvarNovo()">PUBLICAR PRODUTO</button>
            </div>
        </div>

        <div id="sec-estoque" class="section">
            <h1>Estoque</h1>
            <div class="card"><table style="width:100%"><tbody id="lista-estoque"></tbody></table></div>
        </div>

        <div id="sec-config" class="section">
            <h1>Configurações</h1>
            <div class="card">
                <input type="text" id="wa-num" placeholder="WhatsApp">
                <button class="btn-save" onclick="salvarWA()">SALVAR</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        
        // --- LÓGICA DE SEGURANÇA ---
        const SENHA_MESTRA = "zeus2026"; // Defina sua senha aqui
        let timeoutRef;

        function verificarSenha() {
            const digitada = document.getElementById('pass-input').value;
            if(digitada === SENHA_MESTRA) {
                document.getElementById('login-overlay').style.display = 'none';
                sessionStorage.setItem('zeus_auth', 'true');
                resetTimer();
            } else {
                alert("Senha Incorreta!");
            }
        }

        function logout() {
            sessionStorage.removeItem('zeus_auth');
            location.reload();
        }

        // Timeout de 10 minutos de inatividade
        function resetTimer() {
            clearTimeout(timeoutRef);
            timeoutRef = setTimeout(logout, 600000); 
        }

        // Verifica se já está logado ao abrir a página
        if(sessionStorage.getItem('zeus_auth') === 'true') {
            document.getElementById('login-overlay').style.display = 'none';
            resetTimer();
        }

        document.addEventListener('mousemove', resetTimer);
        document.addEventListener('keypress', resetTimer);

        // --- FUNÇÕES DE PRODUTO (Upload Direto) ---
        let fotos = ["", "", "", ""];
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
        }

        function carregarFoto(event, index) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                fotos[index] = e.target.result;
                const slot = document.getElementById('slot-'+index);
                slot.innerHTML = `<img src="${e.target.result}">`;
            };
            reader.readAsDataURL(file);
        }

        async function salvarNovo() {
            if(!fotos[0]) return alert("Capa obrigatória!");
            const extras = fotos.slice(1).filter(f => f !== "").join(',');
            const { error } = await _supabase.from('Produtos').insert([{
                nome: document.getElementById('nnome').value,
                preco: parseFloat(document.getElementById('npreco').value),
                categoria: document.getElementById('ncategoria').value.toUpperCase(),
                imagem_url: fotos[0],
                fotos_extras: extras,
                descricao: document.getElementById('ndesc').value
            }]);
            if(!error) location.reload();
        }

        async function listar() {
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            document.getElementById('lista-estoque').innerHTML = data.map(p => `
                <tr>
                    <td><img src="${p.imagem_url}" style="width:50px; border-radius:5px"></td>
                    <td>${p.nome}</td>
                    <td><button onclick="excluir(${p.id})" style="color:red; border:none; background:none; cursor:pointer">EXCLUIR</button></td>
                </tr>
            `).join('');
        }

        async function excluir(id) {
            if(confirm("Apagar?")) {
                await _supabase.from('Produtos').delete().eq('id', id);
                listar();
            }
        }

        async function salvarWA() {
            const num = document.getElementById('wa-num').value.replace(/\D/g, '');
            await _supabase.from('Configuracoes').update({ whaatsapp: num }).eq('id', 1);
            alert("Salvo!");
        }

        async function carregarWA() {
            const { data } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single();
            if(data) document.getElementById('wa-num').value = data.whaatsapp;
        }
        carregarWA();
    </script>
</body>
</html>
