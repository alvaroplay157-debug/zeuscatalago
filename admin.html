<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS - Master Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --white: #ffffff; }
        body { background: #f8f8f8; font-family: 'Inter', sans-serif; margin: 0; display: flex; color: #222; opacity: 0; transition: opacity 0.4s; }
        .sidebar { width: 280px; background: var(--maroon); color: var(--gold); height: 100vh; padding: 40px 20px; position: fixed; z-index: 100; }
        .sidebar h2 { font-family: 'Playfair Display', serif; letter-spacing: 5px; text-align: center; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 20px; margin-bottom: 30px; }
        .nav-link { display: block; padding: 15px; color: var(--gold); text-decoration: none; font-weight: 600; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-link.active { background: var(--gold); color: var(--maroon); }
        .main { margin-left: 280px; flex: 1; padding: 50px; max-width: 1200px; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 5px 30px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .photo-slot { aspect-ratio: 1; background: #eee; border: 2px dashed #ccc; border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; position: relative; font-size: 10px; text-align: center; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-save { background: var(--maroon); color: var(--gold); padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .img-mini { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        @media (max-width: 768px) { .sidebar { width: 100%; height: auto; position: relative; } .main { margin-left: 0; padding: 20px; } body { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ZEUS</h2>
        <div class="nav-link active" onclick="show('novo')">➕ NOVO PRODUTO</div>
        <div class="nav-link" onclick="show('estoque'); listar();">📝 MEU ESTOQUE</div>
        <div class="nav-link" onclick="show('config'); carregarWA();">⚙️ CONFIGURAÇÕES</div>
        <div class="nav-link" onclick="logout()" style="color: #ff4444; margin-top: 20px;">SAIR</div>
    </div>

    <div class="main">
        <div id="sec-novo" class="section active">
            <div class="card">
                <h3>Novo Produto</h3>
                <div class="photo-grid">
                    <div class="photo-slot" id="slot-0" onclick="document.getElementById('f0').click()"><input type="file" id="f0" accept="image/*" style="display:none" onchange="preview(this, 0)">+ Capa</div>
                    <div class="photo-slot" id="slot-1" onclick="document.getElementById('f1').click()"><input type="file" id="f1" accept="image/*" style="display:none" onchange="preview(this, 1)">+ Foto 2</div>
                    <div class="photo-slot" id="slot-2" onclick="document.getElementById('f2').click()"><input type="file" id="f2" accept="image/*" style="display:none" onchange="preview(this, 2)">+ Foto 3</div>
                    <div class="photo-slot" id="slot-3" onclick="document.getElementById('f3').click()"><input type="file" id="f3" accept="image/*" style="display:none" onchange="preview(this, 3)">+ Foto 4</div>
                </div>
                <input type="text" id="nnome" placeholder="Nome do Produto">
                <input type="number" id="npreco" placeholder="Preço (Ex: 129.90)">
                <input type="text" id="ncategoria" placeholder="Categoria (Ex: CAMISETAS)">
                <textarea id="ndesc" placeholder="Descrição/Tamanhos"></textarea>
                <button class="btn-save" id="btn-pub" onclick="salvarNovo()">PUBLICAR</button>
            </div>
        </div>

        <div id="sec-estoque" class="section">
            <div class="card">
                <table style="width:100%">
                    <tbody id="lista-estoque"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-config" class="section">
            <div class="card">
                <input type="text" id="wa-num" placeholder="WhatsApp (DDD + Número)">
                <button class="btn-save" onclick="salvarWA()">SALVAR CONFIG</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        let fotosBase64 = ["", "", "", ""];

        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.replace("login.html"); } 
            else { document.body.style.opacity = "1"; }
        }

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
        }

        function preview(input, index) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotosBase64[index] = e.target.result;
                    document.getElementById('slot-'+index).innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(file);
            }
        }

        async function salvarNovo() {
            if(!fotosBase64[0]) return alert("Capa obrigatória!");
            const extras = fotosBase64.slice(1).filter(f => f !== "").join(',');
            const { error } = await _supabase.from('Produtos').insert([{
                nome: document.getElementById('nnome').value,
                preco: parseFloat(document.getElementById('npreco').value),
                categoria: document.getElementById('ncategoria').value.toUpperCase(),
                imagem_url: fotosBase64[0],
                fotos_extras: extras,
                descricao: document.getElementById('ndesc').value
            }]);
            if(!error) { alert("Sucesso!"); location.reload(); }
        }

        async function listar() {
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            document.getElementById('lista-estoque').innerHTML = data.map(p => `
                <tr>
                    <td><img src="${p.imagem_url}" class="img-mini"></td>
                    <td>${p.nome}</td>
                    <td><button onclick="excluir(${p.id})">❌</button></td>
                </tr>
            `).join('');
        }

        async function excluir(id) { if(confirm("Apagar?")) { await _supabase.from('Produtos').delete().eq('id', id); listar(); } }
        async function salvarWA() { await _supabase.from('Configuracoes').update({ whaatsapp: document.getElementById('wa-num').value }).eq('id', 1); alert("OK!"); }
        async function carregarWA() { const { data } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single(); if(data) document.getElementById('wa-num').value = data.whaatsapp; }
        async function logout() { await _supabase.auth.signOut(); window.location.replace("login.html"); }

        checkAuth();
        carregarWA();
    </script>
</body>
</html>
