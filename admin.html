<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEUS — Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --maroon-dark: #1a0004;
      --maroon-velvet: #3D0009;
      --gold: #C9A84C;
      --cream: #F5F0E8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--maroon-dark);
      color: var(--cream);
      margin: 0;
    }

    nav {
      background: var(--maroon-velvet);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(201, 168, 76, 0.2);
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 8px 18px;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    .card-admin {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(201, 168, 76, 0.1);
      padding: 30px;
      border-radius: 4px;
      backdrop-filter: blur(10px);
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201, 168, 76, 0.2);
      color: white;
      border-radius: 4px;
      box-sizing: border-box;
    }

    /* Estilo para o input de arquivo */
    input[type="file"] {
      padding: 10px;
      cursor: pointer;
    }

    .btn-save {
      background: var(--gold);
      color: var(--maroon-dark);
      border: none;
      padding: 18px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn-save:disabled {
      background: #444;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <nav>
    <h2 style="font-family: 'Playfair Display'; color: var(--gold); margin:0;">ZEUS ADMIN</h2>
    <button onclick="fazerLogout()" class="btn-logout">Sair</button>
  </nav>

  <div class="container">
    <div class="card-admin">
      <h3 style="font-family: 'Playfair Display'; color: var(--gold); margin-top:0;">Publicar Nova Peça</h3>
      
      <div class="form-group">
        <label>Nome do Produto</label>
        <input type="text" id="nome" placeholder="Ex: Camiseta Zeus Gold">
      </div>

      <div class="form-group">
        <label>Categoria</label>
        <input type="text" id="categoria" placeholder="Ex: Camisetas, Conjuntos, Acessórios">
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <textarea id="descricao" rows="2" placeholder="Detalhes da peça..."></textarea>
      </div>

      <div class="form-group">
        <label>Preço (R$)</label>
        <input type="text" id="preco" placeholder="Ex: 149,90">
      </div>

      <div class="form-group">
        <label>Foto do Produto</label>
        <input type="file" id="arquivo_imagem" accept="image/*">
      </div>

      <button onclick="salvarProduto()" id="btnSalvar" class="btn-save">Publicar no Site</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fxmoxqvtamsxqpabbade.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function verificarSessao() {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) window.location.href = "login.html";
    }
    verificarSessao();

    async function fazerLogout() {
      await _supabase.auth.signOut();
      window.location.href = "login.html";
    }

    async function salvarProduto() {
      const nome = document.getElementById('nome').value;
      const categoria = document.getElementById('categoria').value;
      const descricao = document.getElementById('descricao').value;
      const preco = document.getElementById('preco').value;
      const arquivoInput = document.getElementById('arquivo_imagem');
      const btn = document.getElementById('btnSalvar');

      if (!nome || !categoria || !preco || arquivoInput.files.length === 0) {
        return alert("Preencha todos os campos e selecione uma foto!");
      }

      btn.disabled = true;
      btn.innerText = "Enviando...";

      const arquivo = arquivoInput.files[0];
      const nomeArquivo = `${Date.now()}_${arquivo.name}`;

      // 1. UPLOAD DA IMAGEM PARA O STORAGE
      const { data: uploadData, error: uploadError } = await _supabase.storage
        .from('imagens') // Certifique-se de que o nome do Bucket no Supabase é 'imagens'
        .upload(nomeArquivo, arquivo);

      if (uploadError) {
        alert("Erro no upload da imagem: " + uploadError.message);
        btn.disabled = false;
        btn.innerText = "Publicar no Site";
        return;
      }

      // 2. PEGAR URL PÚBLICA DA IMAGEM
      const { data: { publicUrl } } = _supabase.storage
        .from('imagens')
        .getPublicUrl(nomeArquivo);

      // 3. SALVAR DADOS NA TABELA
      const { error: dbError } = await _supabase.from('Produtos').insert([
        { nome, categoria, descricao, preco, imagem_url: publicUrl }
      ]);

      if (dbError) {
        alert("Erro ao salvar dados: " + dbError.message);
      } else {
        alert("Peça publicada com sucesso!");
        location.reload();
      }

      btn.disabled = false;
      btn.innerText = "Publicar no Site";
    }
  </script>
</body>
</html>
