<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS - Master Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; --white: #ffffff; }
        body { background: #f8f8f8; font-family: 'Inter', sans-serif; margin: 0; display: flex; color: #222; }
        
        .sidebar { width: 280px; background: var(--maroon); color: var(--gold); height: 100vh; padding: 40px 20px; position: fixed; }
        .sidebar h2 { font-family: 'Playfair Display', serif; letter-spacing: 5px; text-align: center; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 20px; margin-bottom: 30px; }
        .nav-link { display: block; padding: 15px; color: var(--gold); text-decoration: none; font-weight: 600; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--gold); color: var(--maroon); }

        .main { margin-left: 280px; flex: 1; padding: 50px; max-width: 1200px; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 5px 30px rgba(0,0,0,0.03); margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display', serif; margin-bottom: 30px; color: var(--maroon); }

        label { display: block; margin-top: 20px; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #555; }
        input, textarea, select { width: 100%; padding: 16px; margin: 8px 0; border: 1px solid #e1e1e1; border-radius: 8px; font-size: 15px; background: #fafafa; transition: 0.3s; outline: none; }
        input:focus, textarea:focus { border-color: var(--gold); background: #fff; }
        
        .btn-save { background: var(--maroon); color: var(--gold); padding: 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; margin-top: 20px; }
        .btn-save:hover { filter: brightness(1.2); }

        /* Grade de Fotos Criativa */
        .photo-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 15px; margin-top: 10px; height: 250px; }
        .photo-slot { background: #f0f0f0; border: 2px dashed #ccc; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; color: #888; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .photo-slot:hover { border-color: var(--gold); color: var(--gold); background: #fafafa; }
        .photo-slot.has-image { border: none; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .photo-slot span { z-index: 2; position: relative; background: rgba(0,0,0,0.5); color: white; padding: 5px 10px; border-radius: 50px; opacity: 0; transition: 0.3s; }
        .photo-slot.has-image:hover span { opacity: 1; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: #fdfdfd; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .stock-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .btn-edit { background: var(--gold); color: var(--maroon); border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-del { background: #ffeded; color: #ff4444; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ZEUS</h2>
        <div class="nav-link active" onclick="show('novo')">➕ NOVO PRODUTO</div>
        <div class="nav-link" onclick="show('estoque'); listar();">📝 MEU ESTOQUE</div>
        <div class="nav-link" onclick="show('config'); carregarWA();">⚙️ CONFIGURAÇÕES</div>
        <br>
        <a href="index.html" class="nav-link" style="border: 1px solid var(--gold); text-align: center;">VER LOJA</a>
    </div>

    <div class="main">
        <div id="sec-novo" class="section active">
            <h1>Criar Novo Produto</h1>
            <div class="card">
                <label>Galeria de Fotos (Clique para colar o link)</label>
                <div class="photo-grid">
                    <div class="photo-slot" id="slot-0" onclick="pedirLink(0)">+ Capa<span>Mudar</span></div>
                    <div class="photo-slot" id="slot-1" onclick="pedirLink(1)">+ Foto 2<span>Mudar</span></div>
                    <div class="photo-slot" id="slot-2" onclick="pedirLink(2)">+ Foto 3<span>Mudar</span></div>
                    <div class="photo-slot" id="slot-3" onclick="pedirLink(3)">+ Foto 4<span>Mudar</span></div>
                </div>

                <div style="display:flex; gap:20px; margin-top:20px;">
                    <div style="flex:2;">
                        <label>Nome do Produto</label>
                        <input type="text" id="nnome" placeholder="Ex: Camiseta Zeus Oversized">
                    </div>
                    <div style="flex:1;">
                        <label>Preço (R$)</label>
                        <input type="number" id="npreco" step="0.01" placeholder="149.90">
                    </div>
                    <div style="flex:1;">
                        <label>Categoria</label>
                        <input type="text" id="ncategoria" placeholder="Ex: CAMISETAS">
                    </div>
                </div>

                <label>Descrição</label>
                <textarea id="ndesc" rows="3" placeholder="Escreva os detalhes da peça..."></textarea>
                
                <button class="btn-save" onclick="salvarNovo()">PUBLICAR PRODUTO</button>
            </div>
        </div>

        <div id="sec-estoque" class="section">
            <h1>Gerenciamento de Estoque</h1>
            <div class="card">
                <table id="tabela-estoque">
                    <thead><tr><th>Imagem</th><th>Produto</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="lista-estoque"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-config" class="section">
            <h1>Configurações Gerais</h1>
            <div class="card" style="max-width: 500px;">
                <label>Seu WhatsApp (Somente números com DDD)</label>
                <input type="text" id="wa-num" placeholder="55839XXXXXXXX">
                <button class="btn-save" onclick="salvarWA()">SALVAR CONTATO</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        
        let fotos = ["", "", "", ""]; // Guarda os 4 links

        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
        }

        // Sistema Criativo de Fotos
        function pedirLink(index) {
            let link = prompt("Cole o link (URL) da imagem aqui:\nExemplo: https://site.com/foto.jpg", fotos[index]);
            if(link !== null) {
                fotos[index] = link.trim();
                atualizarSlot(index);
            }
        }

        function atualizarSlot(index) {
            const slot = document.getElementById('slot-'+index);
            if(fotos[index]) {
                slot.classList.add('has-image');
                let img = slot.querySelector('img');
                if(!img) { img = document.createElement('img'); slot.appendChild(img); }
                img.src = fotos[index];
            } else {
                slot.classList.remove('has-image');
                let img = slot.querySelector('img');
                if(img) img.remove();
            }
        }

        async function salvarNovo() {
            if(!fotos[0]) { alert("A imagem de Capa é obrigatória!"); return; }
            
            // Junta as fotos extras (1, 2 e 3) separadas por vírgula, ignorando as vazias
            const extras = fotos.slice(1).filter(f => f !== "").join(',');

            const { error } = await _supabase.from('Produtos').insert([{
                nome: document.getElementById('nnome').value,
                preco: parseFloat(document.getElementById('npreco').value),
                categoria: document.getElementById('ncategoria').value.toUpperCase(),
                imagem_url: fotos[0], // Capa
                fotos_extras: extras, // Restante
                descricao: document.getElementById('ndesc').value,
                esgotado: false
            }]);
            
            if(!error) { 
                alert("Produto de Luxo publicado!"); 
                location.reload(); 
            } else {
                alert("Erro ao salvar.");
            }
        }

        async function listar() {
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            document.getElementById('lista-estoque').innerHTML = data.map(p => `
                <tr>
                    <td><img src="${p.imagem_url}" class="stock-img"></td>
                    <td><b>${p.nome}</b><br><small style="color:#aaa">${p.categoria}</small></td>
                    <td><b style="color:${p.esgotado?'red':'green'}; font-size:11px;">${p.esgotado?'ESGOTADO':'ATIVO'}</b></td>
                    <td><button class="btn-del" onclick="excluir(${p.id})">APAGAR</button></td>
                </tr>
            `).join('');
        }

        async function excluir(id) {
            if(confirm("Deseja apagar este item permanentemente?")) {
                await _supabase.from('Produtos').delete().eq('id', id);
                listar();
            }
        }

        async function salvarWA() {
            const num = document.getElementById('wa-num').value.replace(/\D/g, '');
            await _supabase.from('Configuracoes').update({ whaatsapp: num }).eq('id', 1);
            alert("WhatsApp Atualizado!");
        }

        async function carregarWA() {
            const { data } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single();
            if(data) document.getElementById('wa-num').value = data.whaatsapp;
        }

        carregarWA();
    </script>
</body>
</html>
