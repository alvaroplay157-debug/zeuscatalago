<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS - Master Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; --white: #ffffff; }
        body { background: #f8f8f8; font-family: 'Inter', sans-serif; margin: 0; display: flex; color: #222; opacity: 0; transition: opacity 0.4s; }
        
        /* Sidebar Luxo */
        .sidebar { width: 280px; background: var(--maroon); color: var(--gold); height: 100vh; padding: 40px 20px; position: fixed; z-index: 100; }
        .sidebar h2 { font-family: 'Playfair Display', serif; letter-spacing: 5px; text-align: center; border-bottom: 1px solid rgba(201,168,76,0.1); padding-bottom: 20px; margin-bottom: 30px; }
        .nav-link { display: block; padding: 15px; color: var(--gold); text-decoration: none; font-weight: 600; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--gold); color: var(--maroon); }

        .main { margin-left: 280px; flex: 1; padding: 50px; max-width: 1200px; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 5px 30px rgba(0,0,0,0.03); margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display', serif; margin-bottom: 30px; color: var(--maroon); }

        label { display: block; margin-top: 20px; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        input, textarea { width: 100%; padding: 16px; margin: 8px 0; border: 1px solid #e1e1e1; border-radius: 8px; font-size: 15px; background: #fafafa; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: #fff; }
        
        .btn-save { background: var(--maroon); color: var(--gold); padding: 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-save:hover { filter: brightness(1.3); }

        /* Grade de Fotos Inteligente */
        .photo-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 15px; margin-top: 10px; height: 250px; }
        .photo-slot { background: #f0f0f0; border: 2px dashed #ccc; border-radius: 12px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; color: #aaa; font-size: 12px; font-weight: bold; text-align: center; }
        .photo-slot.has-image { border: none; }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        /* Tabela de Estoque */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .img-mini { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .btn-del { background: #fff0f0; color: #ff4444; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 20px; box-sizing: border-box; }
            .main { margin-left: 0; padding: 20px; }
            .photo-grid { height: auto; grid-template-columns: 1fr 1fr; grid-auto-rows: 150px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ZEUS</h2>
        <div class="nav-link active" onclick="show('novo')">➕ NOVO PRODUTO</div>
        <div class="nav-link" onclick="show('estoque'); listar();">📝 MEU ESTOQUE</div>
        <div class="nav-link" onclick="show('config'); carregarWA();">⚙️ CONFIGURAÇÕES</div>
        <br>
        <div class="nav-link" onclick="logout()" style="border: 1px solid #ff4444; color: #ff4444; text-align: center;">SAIR</div>
    </div>

    <div class="main">
        <div id="sec-novo" class="section active">
            <h1>Cadastrar Peça</h1>
            <div class="card">
                <label>Fotos do Produto (Toque para abrir galeria/câmera)</label>
                <div class="photo-grid">
                    <div class="photo-slot" id="slot-0" onclick="document.getElementById('f0').click()">
                        <input type="file" id="f0" accept="image/*" style="display:none" onchange="preview(this, 0)">+ Capa
                    </div>
                    <div class="photo-slot" id="slot-1" onclick="document.getElementById('f1').click()">
                        <input type="file" id="f1" accept="image/*" style="display:none" onchange="preview(this, 1)">+ Foto 2
                    </div>
                    <div class="photo-slot" id="slot-2" onclick="document.getElementById('f2').click()">
                        <input type="file" id="f2" accept="image/*" style="display:none" onchange="preview(this, 2)">+ Foto 3
                    </div>
                    <div class="photo-slot" id="slot-3" onclick="document.getElementById('f3').click()">
                        <input type="file" id="f3" accept="image/*" style="display:none" onchange="preview(this, 3)">+ Foto 4
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div><label>Nome do Produto</label><input type="text" id="nnome" placeholder="Ex: Camiseta Zeus Black"></div>
                    <div><label>Preço (R$)</label><input type="number" id="npreco" placeholder="129.90"></div>
                </div>
                <label>Categoria</label><input type="text" id="ncategoria" placeholder="Ex: OVERSIZED">
                <label>Descrição Detalhada</label><textarea id="ndesc" rows="3" placeholder="Tamanhos, tecido, etc."></textarea>
                
                <button class="btn-save" id="btn-pub" onclick="salvarNovo()">PUBLICAR NO CATÁLOGO</button>
            </div>
        </div>

        <div id="sec-estoque" class="section">
            <h1>Meu Estoque</h1>
            <div class="card" style="padding: 20px;">
                <table id="tabela-estoque">
                    <tbody id="lista-estoque"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-config" class="section">
            <h1>Configurações</h1>
            <div class="card">
                <label>Número do WhatsApp (Com DDD)</label>
                <input type="text" id="wa-num" placeholder="5583987005738">
                <button class="btn-save" onclick="salvarWA()">ATUALIZAR CONTATO</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4moxqvtamsxqpabbadeiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');

        let timeoutRef;
        let fotosBase64 = ["", "", "", ""];

        // --- SEGURANÇA ANTILOOP ---
        async function checkAuth() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                // Tenta uma última vez antes de expulsar (evita erro de delay)
                const { data: { user } } = await _supabase.auth.getUser();
                if(!user) {
                    window.location.replace("login.html");
                } else {
                    liberarPainel();
                }
            } else {
                liberarPainel();
            }
        }

        function liberarPainel() {
            document.body.style.opacity = "1";
            resetTimer();
        }

        function resetTimer() {
            clearTimeout(timeoutRef);
            timeoutRef = setTimeout(logout, 900000); // 15 min de inatividade
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.replace("login.html");
        }

        // --- FUNCIONALIDADES ---
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
        }

        function preview(input, index) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fotosBase64[index] = e.target.result;
                    const slot = document.getElementById('slot-'+index);
                    slot.innerHTML = `<img src="${e.target.result}">`;
                    slot.classList.add('has-image');
                };
                reader.readAsDataURL(file);
            }
        }

        async function salvarNovo() {
            if(!fotosBase64[0]) return alert("A foto de capa é obrigatória!");
            const btn = document.getElementById('btn-pub');
            btn.innerText = "ENVIANDO PEÇA...";
            btn.disabled = true;

            const extras = fotosBase64.slice(1).filter(f => f !== "").join(',');

            const { error } = await _supabase.from('Produtos').insert([{
                nome: document.getElementById('nnome').value,
                preco: parseFloat(document.getElementById('npreco').value),
                categoria: document.getElementById('ncategoria').value.toUpperCase(),
                imagem_url: fotosBase64[0],
                fotos_extras: extras,
                descricao: document.getElementById('ndesc').value,
                esgotado: false
            }]);

            if(!error) {
                alert("Produto ZEUS publicado!");
                location.reload();
            } else {
                alert("Erro ao salvar.");
                btn.innerText = "PUBLICAR NO CATÁLOGO";
                btn.disabled = false;
            }
        }

        async function listar() {
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            document.getElementById('lista-estoque').innerHTML = data.map(p => `
                <tr>
                    <td><img src="${p.imagem_url}" class="img-mini"></td>
                    <td><b>${p.nome}</b><br><small>${p.categoria}</small></td>
                    <td><button class="btn-del" onclick="excluir(${p.id})">APAGAR</button></td>
                </tr>
            `).join('');
        }

        async function excluir(id) {
            if(confirm("Deseja remover este produto da ZEUS?")) {
                await _supabase.from('Produtos').delete().eq('id', id);
                listar();
            }
        }

        async function salvarWA() {
            const num = document.getElementById('wa-num').value.replace(/\D/g, '');
            await _supabase.from('Configuracoes').update({ whaatsapp: num }).eq('id', 1);
            alert("WhatsApp Atualizado!");
        }

        async function carregarWA() {
            const { data } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single();
            if(data) document.getElementById('wa-num').value = data.whaatsapp;
        }

        // Eventos e Início
        document.addEventListener('mousemove', resetTimer);
        document.addEventListener('keypress', resetTimer);
        checkAuth();
        carregarWA();
    </script>
</body>
</html>
