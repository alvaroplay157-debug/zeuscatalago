<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZEUS — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --maroon-dark: #1a0004; --maroon-velvet: #3D0009; --gold: #C9A84C; --cream: #F5F0E8; }
    body { font-family: 'Inter', sans-serif; background: var(--maroon-dark); color: var(--cream); margin: 0; }
    nav { background: var(--maroon-velvet); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(201, 168, 76, 0.2); }
    .btn-logout { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; font-size: 10px; font-weight: bold; text-transform: uppercase; }
    .container { max-width: 800px; margin: 40px auto; padding: 20px; }
    .card-admin { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(201, 168, 76, 0.1); padding: 30px; border-radius: 4px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(201, 168, 76, 0.2); color: white; border-radius: 4px; box-sizing: border-box; }
    .btn-save { background: var(--gold); color: var(--maroon-dark); border: none; padding: 15px; font-weight: bold; text-transform: uppercase; width: 100%; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

  <nav>
    <h2 style="font-family: 'Playfair Display'; color: var(--gold); margin:0;">ZEUS ADMIN</h2>
    <button onclick="fazerLogout()" class="btn-logout">Sair</button>
  </nav>

  <div class="container">
    <div class="card-admin">
      <h3 style="font-family: 'Playfair Display'; color: var(--gold);">Novo Produto</h3>
      
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="nome">
      </div>

      <div class="form-group">
        <label>Categoria (Camisetas, Conjuntos, Acessórios)</label>
        <input type="text" id="categoria" placeholder="Escreva exatamente como no filtro">
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <textarea id="descricao" rows="2"></textarea>
      </div>

      <div class="form-group">
        <label>Preço</label>
        <input type="text" id="preco">
      </div>

      <div class="form-group">
        <label>URL da Imagem</label>
        <input type="text" id="imagem_url">
      </div>

      <button onclick="salvarProduto()" class="btn-save">Salvar Produto</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fxmoxqvtamsxqpabbade.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function verificarSessao() {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) window.location.href = "login.html";
    }
    verificarSessao();

    async function fazerLogout() {
      await _supabase.auth.signOut();
      window.location.href = "login.html";
    }

    async function salvarProduto() {
      const nome = document.getElementById('nome').value;
      const categoria = document.getElementById('categoria').value;
      const descricao = document.getElementById('descricao').value;
      const preco = document.getElementById('preco').value;
      const imagem_url = document.getElementById('imagem_url').value;

      if(!nome || !categoria || !preco || !imagem_url) return alert("Preencha os campos!");

      const { error } = await _supabase.from('Produtos').insert([{ nome, categoria, descricao, preco, imagem_url }]);

      if (error) alert("Erro: " + error.message);
      else {
        alert("Sucesso!");
        location.reload();
      }
    }
  </script>
</body>
</html>
