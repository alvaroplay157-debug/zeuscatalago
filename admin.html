<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS - Painel de Controle</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --maroon: #3D0009; --gold: #C9A84C; --cream: #F5F0E8; }
        body { background: var(--cream); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--maroon); color: var(--gold); height: 100vh; padding: 30px; position: fixed; box-sizing: border-box; }
        .sidebar h2 { letter-spacing: 5px; border-bottom: 1px solid #5C0A14; padding-bottom: 10px; font-family: 'serif'; }
        
        /* Área Principal */
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 40px; }
        
        /* Formulário */
        label { display: block; margin-top: 15px; font-size: 0.8rem; font-weight: bold; color: var(--maroon); }
        input, textarea, select { width: 100%; padding: 12px; margin: 5px 0 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        
        .check-group { display: flex; align-items: center; gap: 10px; margin: 15px 0; padding: 10px; border: 1px solid var(--gold); border-radius: 4px; background: rgba(201,168,76,0.05); }
        .check-group input { width: auto; margin: 0; }
        
        button { background: var(--maroon); color: var(--gold); padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #5C0A14; }
        
        .btn-voltar { color: var(--gold); text-decoration: none; font-weight: bold; display: block; margin-bottom: 20px; border: 1px solid var(--gold); padding: 10px; text-align: center; border-radius: 4px; font-size: 0.9rem; transition: 0.3s; }
        
        /* Tabela */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th { background: var(--maroon); color: var(--gold); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        img.thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; background: #eee; }
        
        .btn-delete { background: #ff4444; color: white; padding: 8px 15px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.7rem; width: auto; }
        
        #status-upload { font-size: 0.8rem; color: #cc0000; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>ZEUS</h2>
        <p style="font-size: 0.8rem; letter-spacing: 2px;">PAINEL ADMIN</p>
        <br><br>
        <a href="index.html" class="btn-voltar">← Ver Loja</a>
        <button onclick="logout()" style="background:transparent; border: 1px solid var(--gold);">Sair do Sistema</button>
    </div>

    <div class="main">
        <h1>Gerenciar Catálogo</h1>
        
        <div class="card">
            <h3>Publicar Nova Peça</h3>
            
            <label>Nome do Produto</label>
            <input type="text" id="nome" placeholder="Ex: Camiseta Oversized Black">
            
            <label>Categoria</label>
            <input type="text" id="categoria" placeholder="Ex: CAMISETAS, CONJUNTOS, ACESSÓRIOS">
            
            <label>Preço (R$)</label>
            <input type="number" id="preco" step="0.01" placeholder="Ex: 149.90">
            
            <label>Descrição</label>
            <textarea id="desc" placeholder="Detalhes da peça, tecido, caimento..."></textarea>
            
            <label>Foto Principal (Obrigatória)</label>
            <input type="file" id="arquivo-imagem" accept="image/*">
            
            <label>Fotos Extras (Máximo 3 - Segure Ctrl para selecionar várias)</label>
            <input type="file" id="arquivos-extras" accept="image/*" multiple>
            
            <div class="check-group">
                <input type="checkbox" id="esgotado">
                <label for="esgotado" style="margin: 0;">MARCAR COMO ESGOTADO (Oculta o botão de compra)</label>
            </div>

            <p id="status-upload">A processar... Por favor, aguarde.</p>
            <button id="btn-salvar" onclick="salvar()">Publicar no Site</button>
        </div>

        <h3>Produtos Cadastrados</h3>
        <table>
            <thead>
                <tr>
                    <th>Foto</th>
                    <th>Nome / Categoria</th>
                    <th>Preço</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script>
        // Configurações do Supabase
        const SUPABASE_URL = 'https://fxmoxqvtamsxqpabbade.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Verifica se o usuário está logado
        async function verificarSessao() {
            const { data } = await _supabase.auth.getSession();
            if (!data.session) window.location.href = "login.html";
        }
        verificarSessao();

        async function salvar() {
            const btn = document.getElementById('btn-salvar');
            const status = document.getElementById('status-upload');
            
            const nome = document.getElementById('nome').value;
            const categoria = document.getElementById('categoria').value;
            const preco = document.getElementById('preco').value;
            const descricao = document.getElementById('desc').value;
            const esgotado = document.getElementById('esgotado').checked;
            
            const arquivoPrincipal = document.getElementById('arquivo-imagem').files[0];
            const arquivosExtras = document.getElementById('arquivos-extras').files;

            if (!nome || !preco || !arquivoPrincipal) {
                return alert("Preencha Nome, Preço e selecione a Foto Principal!");
            }

            btn.disabled = true;
            btn.innerText = "A Enviar...";
            status.style.display = "block";

            try {
                // 1. Upload da Foto Principal
                const nomePrincipal = `${Date.now()}_main_${arquivoPrincipal.name.replace(/\s/g, '_')}`;
                const { error: errPrincipal } = await _supabase.storage
                    .from('fotos-produtos')
                    .upload(nomePrincipal, arquivoPrincipal);

                if (errPrincipal) throw new Error("Erro na foto principal: " + errPrincipal.message);

                const { data: linkMain } = _supabase.storage.from('fotos-produtos').getPublicUrl(nomePrincipal);

                // 2. Upload das Fotos Extras (Máximo 3)
                let linksExtras = [];
                const totalParaSubir = Math.min(arquivosExtras.length, 3);

                for (let i = 0; i < totalParaSubir; i++) {
                    const extra = arquivosExtras[i];
                    const nomeExtra = `${Date.now()}_extra${i}_${extra.name.replace(/\s/g, '_')}`;
                    
                    const { error: errExtra } = await _supabase.storage
                        .from('fotos-produtos')
                        .upload(nomeExtra, extra);
                    
                    if (!errExtra) {
                        const { data: linkE } = _supabase.storage.from('fotos-produtos').getPublicUrl(nomeExtra);
                        linksExtras.push(linkE.publicUrl);
                    }
                }

                // 3. Salvar Dados na Tabela Produtos
                const { error: dbError } = await _supabase.from('Produtos').insert([{
                    nome,
                    categoria: categoria.toUpperCase(),
                    preco: parseFloat(preco),
                    descricao,
                    imagem_url: linkMain.publicUrl,
                    fotos_extras: linksExtras.join(','),
                    esgotado
                }]);

                if (dbError) throw dbError;

                alert("Produto publicado com sucesso!");
                location.reload();

            } catch (err) {
                alert("Erro: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "Publicar no Site";
                status.style.display = "none";
            }
        }

        async function listarProdutos() {
            const { data, error } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            const corpo = document.getElementById('tabela-corpo');
            if (error) return console.error(error);

            corpo.innerHTML = ''; 
            data.forEach(item => {
                const badgeStatus = item.esgotado 
                    ? '<span style="color:red; font-weight:bold;">ESGOTADO</span>' 
                    : '<span style="color:green; font-weight:bold;">ATIVO</span>';

                corpo.innerHTML += `
                    <tr>
                        <td><img src="${item.imagem_url}" class="thumb" onerror="this.src='https://via.placeholder.com/50'"></td>
                        <td>
                            <strong>${item.nome}</strong><br>
                            <small style="color:#888">${item.categoria || 'SEM CATEGORIA'}</small>
                        </td>
                        <td>R$ ${item.preco}</td>
                        <td>${badgeStatus}</td>
                        <td><button class="btn-delete" onclick="excluir(${item.id})">REMOVER</button></td>
                    </tr>
                `;
            });
        }

        async function excluir(id) {
            if (confirm("Deseja remover este item definitivamente?")) {
                const { error } = await _supabase.from('Produtos').delete().eq('id', id);
                if (error) alert("Erro: " + error.message);
                else { alert("Item removido!"); listarProdutos(); }
            }
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = "login.html";
        }

        listarProdutos();
    </script>
</body>
</html>
