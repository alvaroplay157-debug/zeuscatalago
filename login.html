<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS - Acesso Restrito</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ANIMAÇÃO DEFINIDA AQUI */
        @keyframes subirEApparecer {
            from {
                opacity: 0;
                transform: translateY(200px); /* Começa 50px abaixo */
            }
            to {
                opacity: 1;
                transform: translateY(0); /* Termina no lugar original */
            }
        }

        body { 
            background: #3D0009; 
            color: #C9A84C; 
            font-family: 'Arial', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; /* Evita barra de rolagem durante a animação */
        }

        .login-card { 
            background: #1a0004; 
            padding: 40px; 
            border-radius: 4px; 
            border: 1px solid #C9A84C; 
            width: 320px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            
            /* APLICAÇÃO DA ANIMAÇÃO */
            animation: subirEApparecer 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        h2 { letter-spacing: 5px; text-transform: uppercase; margin-bottom: 30px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #3D0009; 
            border: 1px solid #5C0A14; 
            color: white; 
            border-radius: 2px; 
            box-sizing: border-box; 
            outline: none;
        }

        input:focus { border-color: #C9A84C; }

        button { 
            width: 100%; 
            padding: 12px; 
            background: #C9A84C; 
            color: #3D0009; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #F5F0E8; transform: scale(1.02); }
        #msg { color: #ff4444; font-size: 0.8rem; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="font-family: 'serif';">ZEUS</h2>
        <p style="font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 20px;">ADMINISTRAÇÃO</p>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="entrar()">Acessar Painel</button>
        <p id="msg"></p>
    </div>

    <script>
        // Coloque sua URL e KEY reais aqui em cima, onde você já tinha colocado antes
    const SUPABASE_URL = 'https://fxmoxqvtamsxqpabbade.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function entrar() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('pass').value;
    const msg = document.getElementById('msg');
    
    msg.innerText = "Verificando...";
    msg.style.color = "#C9A84C";

    const { data, error } = await _supabase.auth.signInWithPassword({
        email: email,
        password: password
    });

    if (error) {
        msg.style.color = "#ff4444";
        if (error.message === "Invalid login credentials") {
            msg.innerText = "E-mail ou senha incorretos.";
        } else {
            msg.innerText = "Erro: " + error.message;
        }
    } else {
        msg.style.color = "#00ff00";
        msg.innerText = "Acesso autorizado! Entrando...";
        setTimeout(() => {
            window.location.href = "admin.html";
        }, 1000);
    }
}
    </script>
</body>
</html>
