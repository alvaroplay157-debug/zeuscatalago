<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS - Painel de Controle</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --maroon: #3D0009; --gold: #C9A84C; --cream: #F5F0E8; }
        body { background: var(--cream); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--maroon); color: var(--gold); height: 100vh; padding: 30px; position: fixed; box-sizing: border-box; }
        .sidebar h2 { letter-spacing: 5px; border-bottom: 1px solid #5C0A14; padding-bottom: 10px; font-family: 'serif'; }
        .main { margin-left: 260px; flex: 1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 40px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .check-group { display: flex; align-items: center; gap: 10px; margin: 15px 0; padding: 10px; border: 1px solid var(--gold); border-radius: 4px; background: rgba(201,168,76,0.05); }
        button { background: var(--maroon); color: var(--gold); padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #5C0A14; }
        .btn-voltar { color: var(--gold); text-decoration: none; font-weight: bold; display: block; margin-bottom: 20px; border: 1px solid var(--gold); padding: 10px; text-align: center; border-radius: 4px; font-size: 0.9rem; transition: 0.3s; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: var(--maroon); color: var(--gold); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        img.thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-off { background: #ff4444; color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ZEUS</h2>
        <p style="font-size: 0.8rem; letter-spacing: 2px;">PAINEL ADMIN</p><br>
        <a href="index.html" class="btn-voltar">← Ver Loja</a>
        <button onclick="logout()" style="background:transparent; border: 1px solid var(--gold);">Sair</button>
    </div>

    <div class="main">
        <h1>Gerenciar Catálogo</h1>
        <div class="card">
            <h3>Nova Peça</h3>
            <input type="text" id="nome" placeholder="Nome da Peça">
            <input type="text" id="categoria" placeholder="Categoria (Camisetas, Conjuntos, etc)">
            <input type="number" id="preco" step="0.01" placeholder="Preço (Ex: 149.90)">
            <textarea id="desc" placeholder="Descrição"></textarea>
            
            <label style="font-size: 11px; font-weight: bold;">Foto Principal:</label>
            <input type="file" id="arquivo-imagem" accept="image/*">
            
            <input type="text" id="fotos_extras" placeholder="Links de fotos extras (separados por vírgula)">
            
            <div class="check-group">
                <input type="checkbox" id="esgotado" style="width: auto;">
                <label for="esgotado" style="color: var(--maroon); font-weight: bold;">PRODUTO ESGOTADO</label>
            </div>
            
            <button id="btn-salvar" onclick="salvar()">Publicar Produto</button>
        </div>

        <table>
            <thead><tr><th>Foto</th><th>Nome</th><th>Preço</th><th>Ação</th></tr></thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://fxmoxqvtamsxqpabbade.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function salvar() {
            const btn = document.getElementById('btn-salvar');
            const arquivo = document.getElementById('arquivo-imagem').files[0];
            if (!arquivo) return alert("Selecione a foto principal!");

            btn.disabled = true; btn.innerText = "Enviando...";
            try {
                const nomeArq = `${Date.now()}_${arquivo.name}`;
                await _supabase.storage.from('fotos-produtos').upload(nomeArq, arquivo);
                const { data: link } = _supabase.storage.from('fotos-produtos').getPublicUrl(nomeArq);

                const dados = {
                    nome: document.getElementById('nome').value,
                    categoria: document.getElementById('categoria').value,
                    preco: document.getElementById('preco').value,
                    descricao: document.getElementById('desc').value,
                    fotos_extras: document.getElementById('fotos_extras').value,
                    esgotado: document.getElementById('esgotado').checked,
                    imagem_url: link.publicUrl
                };

                const { error } = await _supabase.from('Produtos').insert([dados]);
                if (error) throw error;
                alert("Peça cadastrada!"); location.reload();
            } catch (e) { alert("Erro: " + e.message); btn.disabled = false; }
        }

        async function listarProdutos() {
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = data.map(item => `
                <tr>
                    <td><img src="${item.imagem_url}" class="thumb"></td>
                    <td>${item.nome} ${item.esgotado ? '<span class="badge badge-off">OFF</span>' : ''}</td>
                    <td>R$ ${item.preco}</td>
                    <td><button style="background:#ff4444; width:auto;" onclick="excluir(${item.id})">X</button></td>
                </tr>
            `).join('');
        }
        async function excluir(id) { if(confirm("Excluir?")) { await _supabase.from('Produtos').delete().eq('id', id); location.reload(); } }
        async function logout() { await _supabase.auth.signOut(); window.location.href = "login.html"; }
        listarProdutos();
    </script>
</body>
</html>
