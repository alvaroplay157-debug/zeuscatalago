<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS — Urban Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--maroon); color: var(--cream); overflow-x: hidden; }

        .admin-access { position: absolute; top: 20px; right: 30px; font-size: 10px; color: var(--gold); text-decoration: none; opacity: 0.5; transition: 0.4s; padding: 8px 15px; border: 1px solid transparent; border-radius: 50px; z-index: 100; letter-spacing: 2px; }
        .admin-access:hover { opacity: 1; border-color: var(--gold); background: rgba(201,168,76,0.1); }

        header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #2a0006 0%, #1a0004 100%); position: relative; }
        header h1 { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 15vw, 8rem); color: var(--gold); letter-spacing: 20px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-left: 10px; }
        header p { letter-spacing: 8px; opacity: 0.5; font-size: 0.7rem; text-transform: uppercase; margin-top: 10px; }

        .filters { display: flex; justify-content: center; gap: 15px; margin: 40px 0; flex-wrap: wrap; padding: 0 20px; }
        .f-btn { background: none; border: 1px solid rgba(201, 168, 76, 0.2); color: var(--gold); padding: 10px 25px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; border-radius: 50px; transition: 0.4s; }
        .f-btn.active { background: var(--gold); color: var(--maroon); border-color: var(--gold); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 50px; max-width: 1400px; margin: 0 auto; padding: 20px 40px 100px; }
        .card { position: relative; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .img-container { width: 100%; height: 500px; position: relative; overflow: hidden; background: #000; border-radius: 4px; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        
        .slide-indicators { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 6px; z-index: 5; }
        .ind-bar { height: 2px; flex: 1; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .ind-bar.active { background: var(--gold); box-shadow: 0 0 5px var(--gold); }

        .slide-nav { position: absolute; top: 0; bottom: 0; width: 40%; z-index: 4; cursor: pointer; }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }

        .info { padding: 30px 0; }
        .info h3 { font-family: 'Playfair Display'; color: var(--gold); font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 5px; }
        .price { display: block; margin-bottom: 25px; font-weight: 300; opacity: 0.8; font-size: 1.2rem; }

        .btn-wa { background: #25D366; color: white; padding: 20px; text-decoration: none; display: block; text-align: center; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; transition: 0.4s; border-radius: 4px; }
        .btn-wa:hover { filter: brightness(1.1); transform: translateY(-3px); }
        
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25D366; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; z-index: 100; text-decoration: none; animation: pulse-wa 2s infinite; }
        .wa-float svg { width: 35px; height: 35px; fill: white; }
        @keyframes pulse-wa { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }

        #modalMedidas { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; }
        #modalMedidas.active { display: flex; }
        .m-content { background: var(--maroon); border: 1px solid var(--gold); padding: 50px 30px; text-align: center; width: 90%; max-width: 450px; border-radius: 8px; }
        .m-table { width: 100%; border-collapse: collapse; margin: 30px 0; }
        .m-table td { padding: 18px; border-bottom: 1px solid rgba(201, 168, 76, 0.1); font-size: 13px; color: var(--cream); letter-spacing: 2px; }
    </style>
</head>
<body>

    <a href="admin.html" class="admin-access">✦ ACESSO RESTRITO</a>

    <header>
        <h1>ZEUS</h1>
        <p>Urban Luxury — Patos, PB</p>
    </header>

    <div class="filters" id="filtros"></div>
    <div class="grid" id="grid"></div>

    <a href="#" id="wa-global" class="wa-float" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M12.031 0C5.385 0 0 5.385 0 12.031c0 2.645.856 5.105 2.308 7.156L.548 24l5.05-1.745c1.956 1.258 4.269 1.982 6.74 1.982 6.645 0 12.031-5.385 12.031-12.031S18.676 0 12.031 0zm3.84 17.555c-.21.583-1.222 1.118-1.7 1.183-.448.058-1.025.103-3.235-.806-3.08-1.267-5.06-4.42-5.215-4.629-.153-.21-1.248-1.656-1.248-3.159 0-1.503.784-2.245 1.055-2.535.272-.29.593-.362.793-.362.199 0 .397.002.576.01.199.011.464-.078.724.55.27.653.916 2.227.996 2.387.08.159.133.348.026.558-.106.21-.159.342-.319.531-.159.19-.333.421-.476.568-.159.158-.33.328-.148.64.182.312.809 1.332 1.737 2.158 1.2.1.066 1.57.348 1.86.533.29.19.463.095.632-.211.533-.746 1.257-1.42 1.332-1.494.08-.725-.306-.994-.436-1.29-.129-.29-.548-2.693-.632-3.012-.084-.319-.17-.272-.236-.272l-.604-.01z"/></svg>
    </a>

    <div id="modalMedidas" onclick="toggleMedidas()">
        <div class="m-content" onclick="event.stopPropagation()">
            <h2 style="color:var(--gold); font-family:'Playfair Display'; letter-spacing: 5px;">GUIA DE MEDIDAS</h2>
            <table class="m-table">
                <tr><td>P</td><td>50cm LARG x 70cm ALT</td></tr>
                <tr><td>M</td><td>52cm LARG x 72cm ALT</td></tr>
                <tr><td>G</td><td>54cm LARG x 74cm ALT</td></tr>
                <tr><td>GG</td><td>56cm LARG x 76cm ALT</td></tr>
            </table>
            <button onclick="toggleMedidas()" style="background:var(--gold); border:none; color:var(--maroon); padding:15px 40px; font-weight:900; cursor:pointer; letter-spacing:3px; border-radius:4px; margin-top:10px;">FECHAR</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4moxqvtamsxqpabbadeiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        let produtosGerais = [];
        let whatsAppConfig = "";

        async function init() {
            const { data: cfg } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single();
            whatsAppConfig = cfg ? cfg.whaatsapp.replace(/\D/g, '') : "";
            document.getElementById('wa-global').href = `https://wa.me/${whatsAppConfig}`;

            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            produtosGerais = data;

            const categorias = ['TODOS', ...new Set(data.map(p => p.categoria).filter(c => c))];
            document.getElementById('filtros').innerHTML = categorias.map(c => `<button class="f-btn ${c==='TODOS'?'active':''}" onclick="filtrar('${c}', this)">${c}</button>`).join('');
            render(produtosGerais);
        }

        function render(lista) {
            document.getElementById('grid').innerHTML = lista.map((p, idx) => {
                const fotos = [p.imagem_url, ...(p.fotos_extras ? p.fotos_extras.split(',') : [])].filter(u => u && u.trim() !== "");
                const indicadores = fotos.map((_, i) => `<div class="ind-bar ${i===0?'active':''}" id="ind-${idx}-${i}"></div>`).join('');
                const imagens = fotos.map(u => `<img src="${u.trim()}">`).join('');

                // FUNÇÃO CORRIGIDA AQUI:
                const linkWA = `https://wa.me/${whatsAppConfig}?text=${encodeURIComponent('Salve ZEUS! Tenho interesse no item: ' + p.nome)}`;

                return `
                <div class="card">
                    <div class="img-container">
                        <div class="slide-indicators">${indicadores}</div>
                        <div class="slide-nav nav-prev" onclick="moveSlide(${idx}, -1, ${fotos.length})"></div>
                        <div class="slide-nav nav-next" onclick="moveSlide(${idx}, 1, ${fotos.length})"></div>
                        <div class="slider-wrapper" id="wrap-${idx}">${imagens}</div>
                    </div>
                    <div class="info">
                        <h3>${p.nome}</h3>
                        <span class="price">R$ ${parseFloat(p.preco).toFixed(2)}</span>
                        ${p.esgotado ? '<div class="btn-wa" style="background:#222; cursor:not-allowed">ESGOTADO</div>' : `<a href="${linkWA}" class="btn-wa" target="_blank">COMPRAR AGORA</a>`}
                        <button class="f-btn" style="width:100%; margin-top:15px;" onclick="toggleMedidas()">📐 Guia de Medidas</button>
                    </div>
                </div>`;
            }).join('');
        }

        let slidePos = {};
        function moveSlide(idx, dir, total) {
            if (total <= 1) return;
            slidePos[idx] = ((slidePos[idx] || 0) + dir + total) % total;
            document.getElementById(`wrap-${idx}`).style.transform = `translateX(-${slidePos[idx]*100}%)`;
            document.querySelectorAll(`[id^="ind-${idx}-"]`).forEach((b, i) => b.classList.toggle('active', i === slidePos[idx]));
        }

        function filtrar(c, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(c === 'TODOS' ? produtosGerais : produtosGerais.filter(p => p.categoria === c));
        }

        function toggleMedidas() {
            const m = document.getElementById('modalMedidas');
            m.classList.toggle('active');
        }
        init();
    </script>
</body>
</html>
