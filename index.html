<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS — Urban Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--maroon); color: var(--cream); overflow-x: hidden; }
        header { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #2a0006 0%, #1a0004 100%); }
        header h1 { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 15vw, 7rem); color: var(--gold); letter-spacing: 15px; }
        .filters { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .f-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .f-btn.active { background: var(--gold); color: var(--maroon); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid rgba(201,168,76,0.1); }
        .img-container { width: 100%; aspect-ratio: 3/4; overflow: hidden; position: relative; cursor: pointer; background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.4s ease; }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        .ind-container { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; gap: 5px; }
        .ind { height: 3px; flex: 1; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .ind.active { background: var(--gold); }
        .info { padding: 20px; text-align: center; }
        .price { color: var(--gold); font-size: 1.3rem; font-weight: bold; margin: 10px 0; display: block; }
        .btn-wa { background: #25D366; color: white; text-decoration: none; padding: 15px; display: block; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
        .btn-med { color: var(--gold); background: none; border: 1px solid rgba(201,168,76,0.3); padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal img { max-width: 90%; border-radius: 10px; }
    </style>
</head>
<body>
    <header><h1>ZEUS</h1></header>
    <div class="filters" id="filtros"></div>
    <div class="container"><div id="grid" class="grid"></div></div>
    <div id="m-med" class="modal" onclick="this.style.display='none'"><img src="https://down-br.img.susercontent.com/file/br-11134207-7qukw-ljv7n9m63m0995"></div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4moxqvtamsxqpabbadeiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        let produtosGerais = [], tel = "";

        async function init() {
            const { data: cfg } = await _supabase.from('Configuracoes').select('*').eq('id', 1).maybeSingle();
            tel = cfg ? cfg.whaatsapp : "";
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            produtosGerais = data || [];
            render(produtosGerais);
            const cats = ['TODOS', ...new Set(produtosGerais.map(p => p.categoria))];
            document.getElementById('filtros').innerHTML = cats.map(c => `<button class="f-btn" onclick="filtrar('${c}', this)">${c}</button>`).join('');
        }

        function render(lista) {
            document.getElementById('grid').innerHTML = lista.map((p, idx) => {
                const fotos = [p.imagem_url, ...(p.fotos_extras ? p.fotos_extras.split(',') : [])].filter(f => f.length > 50);
                return `
                <div class="card">
                    <div class="img-container" onclick="next(${idx}, ${fotos.length})">
                        <div class="ind-container">${fotos.map((_, i) => `<div class="ind ${i===0?'active':''}" id="ind-${idx}-${i}"></div>`).join('')}</div>
                        <div class="slider-wrapper" id="wrap-${idx}">
                            ${fotos.map(f => `<img src="${f}">`).join('')}
                        </div>
                    </div>
                    <div class="info">
                        <h3>${p.nome}</h3>
                        <span class="price">R$ ${parseFloat(p.preco).toFixed(2)}</span>
                        <a href="https://wa.me/${tel}?text=Interesse: ${p.nome}" class="btn-wa">COMPRAR VIA WHATSAPP</a>
                        <button class="btn-med" onclick="document.getElementById('m-med').style.display='flex'">📏 TABELA DE MEDIDAS</button>
                    </div>
                </div>`;
            }).join('');
        }

        let pos = {};
        function next(idx, total) {
            if (total <= 1) return;
            pos[idx] = ((pos[idx] || 0) + 1) % total;
            document.getElementById(`wrap-${idx}`).style.transform = `translateX(-${pos[idx]*100}%)`;
            document.querySelectorAll(`[id^="ind-${idx}-"]`).forEach((el, i) => el.classList.toggle('active', i === pos[idx]));
        }

        function filtrar(c, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(c === 'TODOS' ? produtosGerais : produtosGerais.filter(p => p.categoria === c));
        }
        init();
    </script>
</body>
</html>
