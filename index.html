<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS — Urban Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--maroon); color: var(--cream); overflow-x: hidden; }
        .admin-access { position: absolute; top: 20px; right: 30px; font-size: 10px; color: var(--gold); text-decoration: none; opacity: 0.5; z-index: 100; letter-spacing: 2px; }
        header { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #2a0006 0%, #1a0004 100%); }
        header h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 12vw, 6rem); color: var(--gold); letter-spacing: 15px; }
        header p { letter-spacing: 5px; opacity: 0.5; font-size: 0.6rem; text-transform: uppercase; }
        .filters { display: flex; justify-content: center; gap: 10px; margin: 20px 0; overflow-x: auto; padding: 10px 20px; }
        .f-btn { background: none; border: 1px solid rgba(201, 168, 76, 0.3); color: var(--gold); padding: 8px 20px; cursor: pointer; font-size: 10px; border-radius: 50px; white-space: nowrap; }
        .f-btn.active { background: var(--gold); color: var(--maroon); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 30px; padding: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); } }
        .card { position: relative; }
        .img-container { width: 100%; aspect-ratio: 3/4; position: relative; overflow: hidden; border-radius: 8px; background: #000; cursor: pointer; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.5s ease; }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        .slide-indicators { position: absolute; bottom: 15px; left: 15px; right: 15px; display: flex; gap: 5px; z-index: 10; }
        .ind-bar { height: 2px; flex: 1; background: rgba(255,255,255,0.2); }
        .ind-bar.active { background: var(--gold); }
        .badge-out { position: absolute; top: 20px; left: 20px; background: var(--red); color: white; padding: 5px 15px; font-size: 10px; font-weight: bold; border-radius: 4px; z-index: 20; background: #ff4444; }
        .info { padding: 20px 0; }
        .info h3 { font-family: 'Playfair Display'; color: var(--gold); font-size: 1.4rem; }
        .price { display: block; margin: 5px 0 20px; opacity: 0.7; }
        .btn-wa { background: #25D366; color: white; padding: 18px; text-decoration: none; display: block; text-align: center; font-weight: 700; font-size: 11px; letter-spacing: 2px; border-radius: 8px; }
        .btn-wa.disabled { background: #444; pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>
    <a href="login.html" class="admin-access">ACESSO</a>
    <header><h1>ZEUS</h1><p>Urban Luxury</p></header>
    <div class="filters" id="filtros"></div>
    <div class="grid" id="grid"></div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        let produtosGerais = [];
        let whatsAppConfig = "";

        async function init() {
            const { data: cfg } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single();
            whatsAppConfig = cfg ? cfg.whaatsapp.replace(/\D/g, '') : "";

            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            produtosGerais = data || [];
            render(produtosGerais);
            
            const cats = ['TODOS', ...new Set(produtosGerais.map(p => p.categoria).filter(c => c))];
            document.getElementById('filtros').innerHTML = cats.map(c => `<button class="f-btn ${c==='TODOS'?'active':''}" onclick="filtrar('${c}', this)">${c}</button>`).join('');
        }

        function render(lista) {
            document.getElementById('grid').innerHTML = lista.map((p, idx) => {
                const fotos = [p.imagem_url, ...(p.fotos_extras ? p.fotos_extras.split(',') : [])].filter(u => u);
                const inds = fotos.map((_, i) => `<div class="ind-bar ${i===0?'active':''}" id="ind-${idx}-${i}"></div>`).join('');
                const imgs = fotos.map(u => `<img src="${u}">`).join('');
                return `
                <div class="card">
                    ${p.esgotado ? '<div class="badge-out">ESGOTADO</div>' : ''}
                    <div class="img-container" onclick="nextPhoto(${idx}, ${fotos.length})">
                        <div class="slide-indicators">${inds}</div>
                        <div class="slider-wrapper" id="wrap-${idx}">${imgs}</div>
                    </div>
                    <div class="info">
                        <h3>${p.nome}</h3>
                        <span class="price">R$ ${parseFloat(p.preco).toFixed(2)}</span>
                        <a href="https://wa.me/${whatsAppConfig}?text=Interesse:%20${encodeURIComponent(p.nome)}" 
                           class="btn-wa ${p.esgotado ? 'disabled' : ''}" target="_blank">
                           ${p.esgotado ? 'INDISPONÍVEL' : 'COMPRAR AGORA'}
                        </a>
                    </div>
                </div>`;
            }).join('');
        }

        let slidePos = {};
        function nextPhoto(idx, total) {
            if (total <= 1) return;
            slidePos[idx] = ((slidePos[idx] || 0) + 1) % total;
            document.getElementById(`wrap-${idx}`).style.transform = `translateX(-${slidePos[idx]*100}%)`;
            document.querySelectorAll(`[id^="ind-${idx}-"]`).forEach((b, i) => b.classList.toggle('active', i === slidePos[idx]));
        }

        function filtrar(c, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(c === 'TODOS' ? produtosGerais : produtosGerais.filter(p => p.categoria === c));
        }
        init();
    </script>
</body>
</html>
