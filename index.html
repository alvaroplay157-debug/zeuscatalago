<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS — Urban Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--maroon); color: var(--cream); overflow-x: hidden; }

        /* Header Premium */
        header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #2a0006 0%, #1a0004 100%); position: relative; }
        header h1 { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 15vw, 8rem); color: var(--gold); letter-spacing: 20px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        header p { letter-spacing: 8px; opacity: 0.5; font-size: 0.7rem; text-transform: uppercase; margin-top: 10px; }

        /* Botão Acesso Restrito Discreto */
        .admin-access { position: absolute; top: 20px; right: 20px; font-size: 10px; color: var(--gold); text-decoration: none; opacity: 0.3; transition: 0.3s; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 50px; }
        .admin-access:hover { opacity: 1; background: var(--gold); color: var(--maroon); }

        .filters { display: flex; justify-content: center; gap: 15px; margin: 40px 0; flex-wrap: wrap; padding: 0 20px; }
        .f-btn { background: none; border: 1px solid rgba(201, 168, 76, 0.2); color: var(--gold); padding: 10px 25px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; border-radius: 50px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .f-btn.active { background: var(--gold); color: var(--maroon); border-color: var(--gold); box-shadow: 0 0 20px rgba(201, 168, 76, 0.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 50px; max-width: 1400px; margin: 0 auto; padding: 20px 40px 100px; }

        /* Card Visual Zara */
        .card { position: relative; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .img-container { width: 100%; height: 500px; position: relative; overflow: hidden; background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        
        .slide-indicators { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 6px; z-index: 5; }
        .ind-bar { height: 1.5px; flex: 1; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .ind-bar.active { background: var(--gold); }

        .slide-nav { position: absolute; top: 0; bottom: 0; width: 40%; z-index: 4; cursor: pointer; }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }

        .info { padding: 30px 0; }
        .info h3 { font-family: 'Playfair Display'; color: var(--gold); font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 5px; }
        .price { display: block; margin-bottom: 25px; font-weight: 300; opacity: 0.7; font-size: 1.1rem; }

        .btn-wa { background: #25D366; color: white; padding: 20px; text-decoration: none; display: block; text-align: center; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; transition: 0.4s; }
        .btn-wa:hover { filter: brightness(1.1); letter-spacing: 4px; }
        
        /* Botão Flutuante WhatsApp */
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 100; transition: 0.3s; }
        .wa-float:hover { transform: scale(1.1); }

        /* Modal com Animação Premium */
        #modalMedidas { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; justify-content: center; align-items: center; opacity: 0; transition: 0.4s; }
        #modalMedidas.active { display: flex; opacity: 1; }
        .m-content { background: var(--maroon); border: 1px solid var(--gold); padding: 60px 40px; text-align: center; width: 90%; max-width: 450px; transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #modalMedidas.active .m-content { transform: scale(1); }
        .m-table { width: 100%; border-collapse: collapse; margin: 30px 0; }
        .m-table td { padding: 20px; border-bottom: 1px solid rgba(201, 168, 76, 0.1); font-size: 13px; color: var(--gold); letter-spacing: 2px; }
    </style>
</head>
<body>

    <a href="admin.html" class="admin-access">RESTRICTED ACCESS</a>

    <header>
        <h1>ZEUS</h1>
        <p>Luxury Streetwear — Patos, PB</p>
    </header>

    <div class="filters" id="filtros"></div>
    <div class="grid" id="grid"></div>

    <a href="#" id="wa-global" class="wa-float" target="_blank">
        <svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.891 11.893-11.891 3.181 0 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414 0 6.556-5.333 11.891-11.893 11.891-2.01 0-3.98-.51-5.725-1.478l-6.267 1.644zm5.223-4.694l.374.222c1.491.884 3.216 1.35 4.999 1.35h.001c5.644 0 10.239-4.595 10.239-10.239 0-2.735-1.064-5.305-2.997-7.238s-4.503-2.997-7.239-2.997c-5.644 0-10.24 4.594-10.24 10.24 0 1.917.513 3.794 1.485 5.421l.243.409-1.01 3.68 3.745-.983z"/></svg>
    </a>

    <div id="modalMedidas" onclick="toggleMedidas()">
        <div class="m-content" onclick="event.stopPropagation()">
            <h2 style="color:var(--gold); font-family:'Playfair Display'; letter-spacing: 5px;">SIZE GUIDE</h2>
            <table class="m-table">
                <tr><td>P (S)</td><td>50cm x 70cm</td></tr>
                <tr><td>M (M)</td><td>52cm x 72cm</td></tr>
                <tr><td>G (L)</td><td>54cm x 74cm</td></tr>
                <tr><td>GG (XL)</td><td>56cm x 76cm</td></tr>
            </table>
            <button onclick="toggleMedidas()" style="background:var(--gold); border:none; color:var(--maroon); padding:15px 40px; font-weight:900; cursor:pointer; letter-spacing:2px;">CLOSE</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        let produtosGerais = [];
        let whatsAppConfig = "";

        async function init() {
            const { data: cfg } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single();
            whatsAppConfig = cfg ? cfg.whaatsapp.replace(/\D/g, '') : "5583987005738";
            document.getElementById('wa-global').href = `https://wa.me/${whatsAppConfig}`;

            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            produtosGerais = data;

            const categorias = ['ALL', ...new Set(data.map(p => p.categoria).filter(c => c))];
            document.getElementById('filtros').innerHTML = categorias.map(c => `<button class="f-btn ${c==='ALL'?'active':''}" onclick="filtrar('${c}', this)">${c}</button>`).join('');
            render(produtosGerais);
        }

        function render(lista) {
            document.getElementById('grid').innerHTML = lista.map((p, idx) => {
                const fotos = [p.imagem_url, ...(p.fotos_extras ? p.fotos_extras.split(',') : [])].filter(u => u.trim() !== "");
                const indicadores = fotos.map((_, i) => `<div class="ind-bar ${i===0?'active':''}" id="ind-${idx}-${i}"></div>`).join('');
                const imagens = fotos.map(u => `<img src="${u.trim()}">`).join('');

                return `
                <div class="card">
                    <div class="img-container">
                        <div class="slide-indicators">${indicadores}</div>
                        <div class="slide-nav nav-prev" onclick="moveSlide(${idx}, -1, ${fotos.length})"></div>
                        <div class="slide-nav nav-next" onclick="moveSlide(${idx}, 1, ${fotos.length})"></div>
                        <div class="slider-wrapper" id="wrap-${idx}">${imagens}</div>
                    </div>
                    <div class="info">
                        <h3>${p.nome}</h3>
                        <span class="price">R$ ${p.preco.toFixed(2)}</span>
                        ${p.esgotado ? '<div class="btn-wa" style="background:#222; cursor:not-allowed">OUT OF STOCK</div>' : `<a href="https://wa.me/${whatsAppConfig}?text=Tenho interesse no item: ${encodeURIComponent(p.nome)}" class="btn-wa" target="_blank">SHOP NOW</a>`}
                        <button class="f-btn" style="width:100%; margin-top:10px;" onclick="toggleMedidas()">Size Guide</button>
                    </div>
                </div>`;
            }).join('');
        }

        let slidePos = {};
        function moveSlide(idx, dir, total) {
            if (total <= 1) return;
            slidePos[idx] = ((slidePos[idx] || 0) + dir + total) % total;
            document.getElementById(`wrap-${idx}`).style.transform = `translateX(-${slidePos[idx]*100}%)`;
            for(let i=0; i<total; i++) {
                const b = document.getElementById(`ind-${idx}-${i}`);
                if(b) b.classList.toggle('active', i===slidePos[idx]);
            }
        }

        function filtrar(c, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(c === 'ALL' ? produtosGerais : produtosGerais.filter(p => p.categoria === c));
        }

        function toggleMedidas() {
            const m = document.getElementById('modalMedidas');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
            setTimeout(() => m.classList.toggle('active'), 10);
        }
        init();
    </script>
</body>
</html>
