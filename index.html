<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS — Urban Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; }
        body { font-family: 'Inter', sans-serif; background: var(--maroon); color: var(--cream); margin: 0; overflow-x: hidden; }
        
        header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        header h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 6rem); color: var(--gold); letter-spacing: 15px; margin: 0; }

        .filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }
        .f-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; transition: 0.3s; }
        .f-btn.active { background: var(--gold); color: var(--maroon); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; max-width: 1300px; margin: 0 auto; padding: 20px; }
        
        .card { background: rgba(255,255,255,0.02); border-radius: 4px; position: relative; transition: 0.4s; }
        .card:hover { transform: translateY(-5px); }
        
        .img-box { width: 100%; height: 450px; position: relative; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .badge-esgotado { position: absolute; top: 20px; left: 20px; background: #ff4444; color: white; padding: 6px 15px; font-size: 10px; font-weight: bold; z-index: 10; }
        .btn-share { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; }

        .info { padding: 25px; text-align: center; }
        .info h3 { margin: 0 0 10px; font-family: 'Playfair Display', serif; letter-spacing: 2px; }
        .price { color: var(--gold); font-size: 1.3rem; font-weight: 600; display: block; margin: 15px 0; }
        
        .btn-wa { background: #25D366; color: white; padding: 15px; display: block; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; border-radius: 2px; }
        .btn-medidas { background: none; border: 1px solid rgba(201,168,76,0.3); color: var(--gold); padding: 6px 12px; font-size: 9px; cursor: pointer; margin-bottom: 15px; text-transform: uppercase; }

        /* MODAL PREMIUM */
        #modalMedidas { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); z-index: 2000; justify-content: center; align-items: center; }
        .m-content { background: var(--maroon); border: 1px solid var(--gold); padding: 40px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 40px rgba(201,168,76,0.2); animation: open 0.3s ease; }
        .m-line { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(201,168,76,0.1); font-size: 13px; }
        @keyframes open { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <header><h1>ZEUS</h1><p style="letter-spacing: 8px; opacity: 0.5;">URBAN LUXURY</p></header>

    <div class="filters" id="filtros">
        <button class="f-btn active" onclick="filtrar('todos')">Todos</button>
    </div>

    <div class="grid" id="grid"></div>

    <div id="modalMedidas" onclick="this.style.display='none'">
        <div class="m-content" onclick="event.stopPropagation()">
            <h2 style="font-family: 'Playfair Display'; color: var(--gold);">TABELA DE MEDIDAS</h2>
            <div class="m-line"><span>TAMANHO P</span> <span>50 x 70 cm</span></div>
            <div class="m-line"><span>TAMANHO M</span> <span>52 x 72 cm</span></div>
            <div class="m-line"><span>TAMANHO G</span> <span>54 x 74 cm</span></div>
            <div class="m-line"><span>TAMANHO GG</span> <span>56 x 76 cm</span></div>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="margin-top: 30px; background: var(--gold); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer;">FECHAR</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        let produtos = [];

        async function init() {
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            produtos = data;
            
            // Criar botões de filtro dinâmicos
            const cats = ['todos', ...new Set(data.map(p => p.categoria).filter(c => c))];
            document.getElementById('filtros').innerHTML = cats.map(c => `<button class="f-btn" onclick="filtrar('${c}')">${c}</button>`).join('');
            
            render(produtos);
        }

        function render(lista) {
            document.getElementById('grid').innerHTML = lista.map(p => {
                const extras = p.fotos_extras ? p.fotos_extras.split(',') : [];
                const hover = extras.length > 0 ? `onmouseover="this.src='${extras[0].trim()}'" onmouseout="this.src='${p.imagem_url}'"` : '';
                
                return `
                <div class="card">
                    ${p.esgotado ? '<div class="badge-esgotado">ESGOTADO</div>' : ''}
                    <button class="btn-share" onclick="share('${p.nome}')">📤</button>
                    <div class="img-box"><img src="${p.imagem_url}" ${hover}></div>
                    <div class="info">
                        <h3>${p.nome}</h3>
                        <p style="font-size: 11px; opacity: 0.6;">${p.descricao || ''}</p>
                        <button class="btn-medidas" onclick="document.getElementById('modalMedidas').style.display='flex'">Medidas</button>
                        <span class="price">R$ ${p.preco}</span>
                        ${p.esgotado ? '<div class="btn-wa" style="background:#333">Indisponível</div>' : `<a href="https://wa.me/55839XXXXXXXX?text=Salve Zeus! Quero a peça: ${p.nome}" class="btn-wa" target="_blank">Pedir Agora</a>`}
                    </div>
                </div>`;
            }).join('');
        }

        function filtrar(c) { render(c === 'todos' ? produtos : produtos.filter(p => p.categoria === c)); }
        function share(n) { if(navigator.share) navigator.share({title:'ZEUS', text:'Olha isso: '+n, url: window.location.href}); }
        init();
    </script>
</body>
</html>
