<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS — Urban Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; }
        body { font-family: 'Inter', sans-serif; background: var(--maroon); color: var(--cream); margin: 0; }
        
        header { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--gold); letter-spacing: 15px; margin: 0; }

        .filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; }
        .f-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
        .f-btn.active { background: var(--gold); color: var(--maroon); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .card { background: rgba(255,255,255,0.03); border-radius: 4px; overflow: hidden; position: relative; }
        .img-box { width: 100%; height: 400px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .info { padding: 20px; text-align: center; }
        .price { color: var(--gold); font-size: 1.2rem; font-weight: bold; display: block; margin: 10px 0; }
        
        .btn-wa { background: #25D366; color: white; padding: 12px; display: block; text-decoration: none; font-weight: bold; border-radius: 2px; font-size: 11px; margin-bottom: 10px; }
        .btn-share-link { background: none; border: 1px solid rgba(255,255,255,0.2); color: #aaa; padding: 8px; width: 100%; cursor: pointer; font-size: 10px; text-transform: uppercase; }

        /* Botão Flutuante WhatsApp */
        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; text-decoration: none; }

        /* Rodapé com Acesso Restrito */
        footer { padding: 50px 20px; text-align: center; opacity: 0.5; font-size: 12px; }
        .admin-link { color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 4px; }

        /* Modal Medidas */
        #modalMedidas { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; }
        .m-content { background: var(--maroon); border: 1px solid var(--gold); padding: 30px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 0 30px rgba(201,168,76,0.2); }
    </style>
</head>
<body>

    <a href="https://wa.me/55839XXXXXXXX" class="wa-float" target="_blank">📲</a>

    <header><h1>ZEUS</h1><p style="letter-spacing: 5px; opacity: 0.6;">PATOS — PB</p></header>

    <div class="filters" id="filtros"></div>

    <div class="grid" id="grid"></div>

    <footer>
        <p>© 2026 ZEUS URBAN LUXURY</p><br>
        <a href="login.html" class="admin-link">MODO ACESSO RESTRITO</a>
    </footer>

    <div id="modalMedidas" onclick="this.style.display='none'">
        <div class="m-content" onclick="event.stopPropagation()">
            <h2 style="color: var(--gold); font-family: 'Playfair Display';">TABELA DE MEDIDAS</h2>
            <p>P: 50x70cm | M: 52x72cm | G: 54x74cm</p>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="background: var(--gold); border: none; padding: 10px; cursor: pointer;">FECHAR</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        let produtos = [];

        async function init() {
            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            produtos = data;
            const cats = ['todos', ...new Set(data.map(p => p.categoria).filter(c => c))];
            document.getElementById('filtros').innerHTML = cats.map(c => `<button class="f-btn" onclick="filtrar('${c}')">${c}</button>`).join('');
            render(produtos);
        }

        function render(lista) {
            document.getElementById('grid').innerHTML = lista.map(p => {
                const extras = p.fotos_extras ? p.fotos_extras.split(',') : [];
                const hover = extras.length > 0 ? `onmouseover="this.src='${extras[0].trim()}'" onmouseout="this.src='${p.imagem_url}'"` : '';
                return `
                <div class="card">
                    <div class="img-box"><img src="${p.imagem_url}" ${hover}></div>
                    <div class="info">
                        <h3>${p.nome}</h3>
                        <span class="price">R$ ${p.preco}</span>
                        ${p.esgotado ? '<div class="btn-wa" style="background:#444">ESGOTADO</div>' : `<a href="https://wa.me/55839XXXXXXXX?text=Salve! Quero: ${p.nome}" class="btn-wa" target="_blank">Pedir Agora</a>`}
                        <button class="btn-share-link" onclick="share('${p.nome}')">🔗 Compartilhar Peça</button>
                    </div>
                </div>`;
            }).join('');
        }

        function filtrar(c) { render(c === 'todos' ? produtos : produtos.filter(p => p.categoria === c)); }
        function share(n) { if(navigator.share) navigator.share({title:'ZEUS', text:'Olha essa peça: '+n, url: window.location.href}); }
        init();
    </script>
</body>
</html>
