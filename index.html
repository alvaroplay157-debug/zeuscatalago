<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS — Urban Luxury</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--maroon); color: var(--cream); margin: 0; overflow-x: hidden; }
        header { height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #2a0006 0%, #1a0004 100%); }
        header h1 { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 12vw, 7rem); color: var(--gold); letter-spacing: 15px; margin: 0; }
        header p { letter-spacing: 5px; opacity: 0.6; font-size: 0.7rem; text-transform: uppercase; margin-top: 10px; }
        .filters { display: flex; justify-content: center; gap: 10px; margin: 30px 0; flex-wrap: wrap; padding: 0 20px; }
        .f-btn { background: none; border: 1px solid rgba(201, 168, 76, 0.3); color: var(--gold); padding: 8px 20px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; border-radius: 50px; transition: 0.3s; }
        .f-btn.active { background: var(--gold); color: var(--maroon); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; max-width: 1300px; margin: 0 auto; padding: 20px 20px 100px; }
        .card { position: relative; }
        .img-container { width: 100%; height: 480px; position: relative; overflow: hidden; border-radius: 2px; background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .slider-wrapper img { width: 100%; height: 100%; object-fit: cover; flex-shrink: 0; }
        .slide-indicators { position: absolute; top: 15px; left: 15px; right: 15px; display: flex; gap: 5px; z-index: 5; }
        .ind-bar { height: 2px; flex: 1; background: rgba(255,255,255,0.15); }
        .ind-bar.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .slide-nav { position: absolute; top: 0; bottom: 0; width: 35%; z-index: 4; cursor: pointer; }
        .nav-prev { left: 0; }
        .nav-next { right: 0; }
        .info { padding: 25px 0; }
        .info h3 { margin: 0; font-family: 'Playfair Display'; color: var(--gold); font-size: 1.4rem; letter-spacing: 1px; }
        .price { display: block; margin: 8px 0 25px; font-weight: 300; opacity: 0.8; font-size: 1.2rem; }
        .btn-wa { background: #25D366; color: white; padding: 18px; text-decoration: none; display: block; text-align: center; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; }
        .btn-medidas { background: none; border: 1px solid rgba(201,168,76,0.2); color: var(--gold); width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; font-size: 9px; text-transform: uppercase; }
        #modalMedidas { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 1000; justify-content: center; align-items: center; }
        .m-content { background: var(--maroon); border: 1px solid var(--gold); padding: 50px 30px; text-align: center; width: 90%; max-width: 450px; }
        .m-table { width: 100%; border-collapse: collapse; margin: 30px 0; }
        .m-table td { padding: 15px; border-bottom: 1px solid rgba(201,168,76,0.1); font-size: 12px; color: #fff; }
        .close-m { background: var(--gold); border: none; color: var(--maroon); padding: 12px 35px; cursor: pointer; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <h1>ZEUS</h1>
        <p>Urban Luxury — Patos, PB</p>
    </header>

    <div class="filters" id="filtros"></div>
    <div class="grid" id="grid"></div>

    <div id="modalMedidas">
        <div class="m-content">
            <h2 style="color:var(--gold); font-family:'Playfair Display';">GUIA DE MEDIDAS</h2>
            <table class="m-table">
                <tr><td>P</td><td>50cm LARG | 70cm ALT</td></tr>
                <tr><td>M</td><td>52cm LARG | 72cm ALT</td></tr>
                <tr><td>G</td><td>54cm LARG | 74cm ALT</td></tr>
                <tr><td>GG</td><td>56cm LARG | 76cm ALT</td></tr>
            </table>
            <button class="close-m" onclick="toggleMedidas()">Fechar</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fxmoxqvtamsxqpabbade.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU');
        let produtosGerais = [];
        let whatsAppConfig = "";

        async function init() {
            // Busca WhatsApp da tabela Configuracoes coluna whaatsapp
            const { data: cfg } = await _supabase.from('Configuracoes').select('whaatsapp').eq('id', 1).single();
            whatsAppConfig = cfg ? cfg.whaatsapp.replace(/\D/g, '') : "";

            const { data } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
            produtosGerais = data;

            const categorias = ['TODOS', ...new Set(data.map(p => p.categoria).filter(c => c))];
            document.getElementById('filtros').innerHTML = categorias.map(c => `<button class="f-btn ${c==='TODOS'?'active':''}" onclick="filtrar('${c}', this)">${c}</button>`).join('');
            render(produtosGerais);
        }

        function render(lista) {
            document.getElementById('grid').innerHTML = lista.map((p, idx) => {
                const fotos = [p.imagem_url, ...(p.fotos_extras ? p.fotos_extras.split(',') : [])].filter(u => u.trim() !== "");
                const indicadores = fotos.map((_, i) => `<div class="ind-bar ${i===0?'active':''}" id="ind-${idx}-${i}"></div>`).join('');
                const imagens = fotos.map(u => `<img src="${u.trim()}">`).join('');
                const linkWA = `https://api.whatsapp.com/send?phone=${whatsAppConfig}&text=Salve%20ZEUS!%20Tenho%20interesse%20no%20item:%20${encodeURIComponent(p.nome)}`;

                return `
                <div class="card">
                    <div class="img-container">
                        <div class="slide-indicators">${indicadores}</div>
                        <div class="slide-nav nav-prev" onclick="moveSlide(${idx}, -1, ${fotos.length})"></div>
                        <div class="slide-nav nav-next" onclick="moveSlide(${idx}, 1, ${fotos.length})"></div>
                        <div class="slider-wrapper" id="wrap-${idx}">${imagens}</div>
                    </div>
                    <div class="info">
                        <h3>${p.nome}</h3>
                        <span class="price">R$ ${p.preco.toFixed(2)}</span>
                        ${p.esgotado ? '<div class="btn-wa" style="background:#222">ESGOTADO</div>' : `<a href="${linkWA}" class="btn-wa" target="_blank">Pedir agora</a>`}
                        <button class="btn-medidas" onclick="toggleMedidas()">📐 Guia de Medidas</button>
                    </div>
                </div>`;
            }).join('');
        }

        let slidePos = {};
        function moveSlide(idx, dir, total) {
            if (total <= 1) return;
            slidePos[idx] = ((slidePos[idx] || 0) + dir + total) % total;
            document.getElementById(`wrap-${idx}`).style.transform = `translateX(-${slidePos[idx]*100}%)`;
            for(let i=0; i<total; i++) document.getElementById(`ind-${idx}-${i}`).classList.toggle('active', i===slidePos[idx]);
        }

        function filtrar(c, btn) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(c === 'TODOS' ? produtosGerais : produtosGerais.filter(p => p.categoria === c));
        }

        function toggleMedidas() {
            const m = document.getElementById('modalMedidas');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }
        init();
    </script>
</body>
</html>
