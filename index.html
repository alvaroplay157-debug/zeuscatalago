<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEUS — Urban Luxury</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --maroon: #1a0004; --gold: #C9A84C; --cream: #F5F0E8; }
    body { font-family: 'Inter', sans-serif; background: var(--maroon); color: var(--cream); margin: 0; }
    
    header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 5rem; color: var(--gold); margin: 0; letter-spacing: 10px; }

    .filter-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; flex-wrap: wrap; }
    .filter-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; text-transform: uppercase; font-size: 10px; transition: 0.3s; }
    .filter-btn.active { background: var(--gold); color: var(--maroon); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    .product-card { background: rgba(255,255,255,0.05); position: relative; border-radius: 4px; overflow: hidden; }
    .badge-esgotado { position: absolute; top: 10px; left: 10px; background: #ff4444; color: white; padding: 5px 10px; font-size: 10px; font-weight: bold; z-index: 5; }
    
    .img-container { width: 100%; height: 400px; position: relative; overflow: hidden; }
    .img-container img { width: 100%; height: 100%; object-fit: cover; }
    
    .info { padding: 20px; text-align: center; }
    .price { font-size: 1.2rem; font-weight: bold; display: block; margin: 10px 0; }
    
    .btn-share { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); border: none; color: white; padding: 8px; border-radius: 50%; cursor: pointer; z-index: 5; }
    
    .bbuy { background: #25D366; color: white; padding: 12px; display: block; text-decoration: none; font-weight: bold; text-transform: uppercase; border-radius: 4px; font-size: 11px; }
    .btn-medidas { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; font-size: 9px; cursor: pointer; margin-bottom: 15px; }

    /* Modal Simples */
    #modalMedidas { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
  </style>
</head>
<body>

  <header>
    <h1>ZEUS</h1>
    <p style="letter-spacing: 5px; opacity: 0.6;">PATOS — PB</p>
  </header>

  <div class="filter-container">
    <button class="filter-btn active" onclick="filtrar('todos')">Todos</button>
    <button class="filter-btn" onclick="filtrar('Camisetas')">Camisetas</button>
    <button class="filter-btn" onclick="filtrar('Conjuntos')">Conjuntos</button>
  </div>

  <div class="grid" id="grid"></div>

  <div id="modalMedidas" onclick="this.style.display='none'">
    <div style="background: white; padding: 20px; border-radius: 8px; text-align: center;">
        <h2 style="color: black;">Tabela de Medidas</h2>
        <p style="color: #666;">P: 50cm x 70cm | M: 52cm x 72cm | G: 54cm x 74cm</p>
        <button style="background: black; color: white; padding: 10px;">FECHAR</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fxmoxqvtamsxqpabbade.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bW94cXZ0YW1zeHFwYWJiYWRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0Njc3NTgsImV4cCI6MjA4OTA0Mzc1OH0.H2mn5rb2WChGw9yWMrdk3MpYIHH1N0hKZMeggOEiQBU';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let produtosGerais = [];

    async function carregar() {
      const { data, error } = await _supabase.from('Produtos').select('*').order('id', { ascending: false });
      if (error) return;
      produtosGerais = data;
      exibirProdutos(produtosGerais);
    }

    function exibirProdutos(lista) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      lista.forEach(p => {
        const badge = p.esgotado ? '<div class="badge-esgotado">ESGOTADO</div>' : '';
        const botao = p.esgotado ? '<div class="bbuy" style="background:#444">Indisponível</div>' : `<a href="https://wa.me/55839XXXXXXXX?text=Salve Zeus! Quero a peça: ${p.nome}" class="bbuy" target="_blank">Pedir no WhatsApp</a>`;
        
        // Lógica simples para trocar foto ao passar o mouse (se houver foto extra)
        const fotos = p.fotos_extras ? p.fotos_extras.split(',') : [];
        const fotoSecundaria = fotos.length > 0 ? fotos[0].trim() : p.imagem_url;

        grid.innerHTML += `
          <div class="product-card">
            ${badge}
            <button class="btn-share" onclick="compartilhar('${p.nome}')">📤</button>
            <div class="img-container">
              <img src="${p.imagem_url}" 
                   onmouseover="this.src='${fotoSecundaria}'" 
                   onmouseout="this.src='${p.imagem_url}'">
            </div>
            <div class="info">
              <h3>${p.nome}</h3>
              <p style="font-size: 12px; opacity: 0.7;">${p.descricao || ""}</p>
              <button class="btn-medidas" onclick="document.getElementById('modalMedidas').style.display='flex'">Ver Medidas</button>
              <span class="price">R$ ${p.preco}</span>
              ${botao}
            </div>
          </div>
        `;
      });
    }

    function compartilhar(nome) {
      if (navigator.share) {
        navigator.share({ title: 'ZEUS', text: 'Olha essa peça da ZEUS: ' + nome, url: window.location.href });
      } else {
        alert("Link copiado!");
      }
    }

    function filtrar(cat) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      const f = cat === 'todos' ? produtosGerais : produtosGerais.filter(p => p.categoria === cat);
      exibirProdutos(f);
    }

    carregar();
  </script>
</body>
</html>
